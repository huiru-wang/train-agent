<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马卡龙药丸 — 风格预览</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* === VIEWPORT BASE === */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow-x: hidden; }
.slide { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; position: relative; }
:root {
    --title-size: clamp(1.5rem, 5vw, 3.5rem);
    --h2-size: clamp(1.25rem, 3vw, 2rem);
    --body-size: clamp(0.75rem, 1.4vw, 1rem);
    --small-size: clamp(0.65rem, 1vw, 0.875rem);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}
@media (max-height: 600px) { :root { --title-size: clamp(1.1rem, 4vw, 2rem); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; } }

/* === PASTEL GEOMETRY THEME === */
:root {
    --bg-primary: #c8d9e6;
    --card-bg: #faf9f7;
    --pill-pink: #f0b4d4;
    --pill-mint: #a8d4c4;
    --pill-sage: #5a7c6a;
    --pill-lavender: #9b8dc4;
    --pill-violet: #7c6aad;
    --font-display: 'Plus Jakarta Sans', sans-serif;
    --font-body: 'Plus Jakarta Sans', sans-serif;
}

body { background: var(--bg-primary); font-family: var(--font-body); }

/* Geometric decorations */
.geo-shape {
    position: absolute;
    pointer-events: none;
}
.geo-circle-1 {
    width: clamp(100px, 15vw, 200px);
    height: clamp(100px, 15vw, 200px);
    border-radius: 50%;
    background: var(--pill-pink);
    opacity: 0.3;
    top: -5%;
    left: -3%;
}
.geo-circle-2 {
    width: clamp(60px, 8vw, 100px);
    height: clamp(60px, 8vw, 100px);
    border-radius: 50%;
    background: var(--pill-mint);
    opacity: 0.4;
    bottom: 8%;
    left: 5%;
}
.geo-square {
    width: clamp(40px, 6vw, 70px);
    height: clamp(40px, 6vw, 70px);
    border-radius: 12px;
    background: var(--pill-lavender);
    opacity: 0.25;
    top: 15%;
    right: 22%;
    transform: rotate(15deg);
}

/* Main card */
.main-card {
    position: absolute;
    inset: clamp(1.5rem, 4vh, 3rem);
    right: clamp(3.5rem, 7vw, 5.5rem);
    background: var(--card-bg);
    border-radius: clamp(16px, 2vw, 28px);
    box-shadow: 0 clamp(10px, 2vw, 30px) clamp(30px, 5vw, 60px) rgba(0,0,0,0.08);
    padding: clamp(1.5rem, 4vw, 3.5rem);
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* Vertical pills on right edge */
.pills {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: clamp(1rem, 3vh, 2rem) 0;
}
.pill {
    width: clamp(28px, 3.5vw, 42px);
    border-radius: 100px 0 0 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: clamp(0.55rem, 0.8vw, 0.7rem);
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: width 0.3s ease;
}
.pill:hover { width: clamp(32px, 4vw, 48px); }
.pill-1 { height: clamp(50px, 14vh, 110px); background: var(--pill-pink); }
.pill-2 { height: clamp(60px, 16vh, 130px); background: var(--pill-mint); }
.pill-3 { height: clamp(70px, 18vh, 150px); background: var(--pill-sage); }
.pill-4 { height: clamp(55px, 15vh, 120px); background: var(--pill-lavender); }
.pill-5 { height: clamp(45px, 13vh, 100px); background: var(--pill-violet); }

/* Download icon */
.download-icon {
    position: absolute;
    top: clamp(1rem, 2vw, 1.5rem);
    right: clamp(1rem, 2vw, 1.5rem);
    width: clamp(32px, 4vw, 44px);
    height: clamp(32px, 4vw, 44px);
    border-radius: 50%;
    background: var(--pill-sage);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: clamp(0.8rem, 1.2vw, 1.1rem);
    cursor: pointer;
    z-index: 5;
}

/* Content */
.main-card .label {
    font-size: var(--small-size);
    color: var(--pill-violet);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
}
.main-card h1 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: var(--title-size);
    line-height: 1.05;
    color: #1a1a1a;
    margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
}
.main-card .subtitle {
    font-size: var(--body-size);
    color: #666;
    line-height: 1.6;
    max-width: 420px;
    margin-bottom: clamp(0.75rem, 2vw, 1.5rem);
}

/* Feature badges */
.feature-row {
    display: flex;
    gap: clamp(0.5rem, 1vw, 0.8rem);
    flex-wrap: wrap;
}
.feature-badge {
    display: flex;
    align-items: center;
    gap: 0.4em;
    padding: 0.4em 0.9em;
    border-radius: 100px;
    font-size: var(--small-size);
    font-weight: 700;
}
.feature-badge .dot { width: 8px; height: 8px; border-radius: 50%; }
.fb-pink { background: rgba(240, 180, 212, 0.2); color: #c44a8a; }
.fb-pink .dot { background: var(--pill-pink); }
.fb-mint { background: rgba(168, 212, 196, 0.2); color: #3a7a5a; }
.fb-mint .dot { background: var(--pill-mint); }
.fb-lavender { background: rgba(155, 141, 196, 0.2); color: var(--pill-violet); }
.fb-lavender .dot { background: var(--pill-lavender); }

/* Animations */
.reveal { opacity: 0; transform: translateY(25px); transition: opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo); }
.visible .reveal:nth-child(1) { transition-delay: 0.1s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(2) { transition-delay: 0.2s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(3) { transition-delay: 0.3s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(4) { transition-delay: 0.4s; opacity: 1; transform: translateY(0); }

/* CTA button */
.cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5em;
    background: #1a1a1a;
    color: white;
    padding: 0.7em 1.5em;
    border-radius: 100px;
    font-size: var(--small-size);
    font-weight: 700;
    text-decoration: none;
    width: fit-content;
    margin-top: clamp(0.5rem, 1.5vw, 1rem);
}
</style>
</head>
<body>

<section class="slide" id="slide1">
    <div class="geo-shape geo-circle-1"></div>
    <div class="geo-shape geo-circle-2"></div>
    <div class="geo-shape geo-square"></div>

    <div class="main-card">
        <div class="download-icon">↓</div>

        <div class="pills">
            <div class="pill pill-1">收件箱</div>
            <div class="pill pill-2">日程</div>
            <div class="pill pill-3">项目</div>
            <div class="pill pill-4">笔记</div>
            <div class="pill pill-5">设置</div>
        </div>

        <div style="margin-right: clamp(2.5rem, 5vw, 3.5rem);">
            <div class="label reveal">效率应用</div>
            <h1 class="reveal">让你的每一天<br>井井有条</h1>
            <p class="subtitle reveal">计划、追踪、完成——全部在一个安静的工间里。没有杂乱，没有噪音。只有你与你的目标。</p>
            <div class="feature-row reveal">
                <span class="feature-badge fb-pink"><span class="dot"></span>智能任务</span>
                <span class="feature-badge fb-mint"><span class="dot"></span>专注计时</span>
                <span class="feature-badge fb-lavender"><span class="dot"></span>云端同步</span>
            </div>
            <a href="#" class="cta-btn reveal">免费开始使用 →</a>
        </div>
    </div>
</section>

<script>
if (location.search.includes('thumb')) {
    document.querySelectorAll('.slide').forEach(s => s.classList.add('visible'));
} else {
    const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.2 });
    document.querySelectorAll('.slide').forEach(s => obs.observe(s));
}
</script>
</body>
</html>
