<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蜜桃薰衣草 — 风格预览</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* === VIEWPORT BASE === */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow-x: hidden; }
.slide { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; position: relative; }
:root {
    --title-size: clamp(1.5rem, 5vw, 3.5rem);
    --h2-size: clamp(1.25rem, 3vw, 2rem);
    --body-size: clamp(0.75rem, 1.4vw, 1rem);
    --small-size: clamp(0.65rem, 1vw, 0.875rem);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}
@media (max-height: 600px) { :root { --title-size: clamp(1.1rem, 4vw, 2rem); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; } }

/* === SPLIT PASTEL THEME === */
:root {
    --bg-peach: #f5e6dc;
    --bg-lavender: #e4dff0;
    --text-dark: #1a1a1a;
    --badge-mint: #c8f0d8;
    --badge-yellow: #f0f0c8;
    --badge-pink: #f0d4e0;
    --font-display: 'Outfit', sans-serif;
    --font-body: 'Outfit', sans-serif;
}

body { font-family: var(--font-body); margin: 0; }

/* Two-color split */
.split-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100%;
}
.panel-peach {
    background: var(--bg-peach);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(1.5rem, 4vw, 4rem);
    position: relative;
    overflow: hidden;
}
.panel-lavender {
    background: var(--bg-lavender);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(1.5rem, 4vw, 4rem);
    position: relative;
    overflow: hidden;
}

/* Grid pattern on right */
.grid-pattern {
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
}

/* Playful badge pills */
.playful-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4em;
    padding: 0.5em 1em;
    border-radius: 100px;
    font-size: var(--small-size);
    font-weight: 700;
    margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
    width: fit-content;
}
.badge-mint { background: var(--badge-mint); color: #2a6a4a; }
.badge-yellow { background: var(--badge-yellow); color: #7a6a2a; }
.badge-pink { background: var(--badge-pink); color: #8a4a6a; }

/* Typography - left */
.panel-peach h1 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: var(--title-size);
    line-height: 1.05;
    color: var(--text-dark);
    margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
}
.panel-peach p {
    font-size: var(--body-size);
    color: #555;
    line-height: 1.6;
    max-width: 380px;
    margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
}

/* Rounded CTA buttons */
.cta-row {
    display: flex;
    gap: clamp(0.5rem, 1vw, 0.8rem);
    flex-wrap: wrap;
}
.cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4em;
    padding: 0.7em 1.5em;
    border-radius: 100px;
    font-size: var(--body-size);
    font-weight: 700;
    text-decoration: none;
    transition: transform 0.2s ease;
    border: none;
    cursor: pointer;
}
.cta-btn:hover { transform: scale(1.03); }
.cta-primary { background: var(--text-dark); color: white; }
.cta-outline { background: transparent; color: var(--text-dark); border: 2px solid rgba(0,0,0,0.15); }

/* Typography - right */
.panel-lavender h2 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: var(--h2-size);
    color: var(--text-dark);
    margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
}

/* Checklist */
.checklist {
    list-style: none;
    margin-top: clamp(0.5rem, 1.5vw, 1rem);
}
.checklist li {
    display: flex;
    align-items: center;
    gap: clamp(0.5rem, 1vw, 0.8rem);
    padding: clamp(0.3rem, 0.8vw, 0.5rem) 0;
    font-size: var(--body-size);
    color: #444;
}
.check-icon {
    width: clamp(18px, 2vw, 22px);
    height: clamp(18px, 2vw, 22px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.6rem, 1vw, 0.8rem);
    flex-shrink: 0;
}
.check-1 { background: var(--badge-mint); }
.check-2 { background: var(--badge-yellow); }
.check-3 { background: var(--badge-pink); }

/* Floating circles */
.float-circle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
}
.fc-1 {
    width: clamp(40px, 5vw, 60px);
    height: clamp(40px, 5vw, 60px);
    background: rgba(255, 255, 255, 0.4);
    top: 10%;
    left: 15%;
}
.fc-2 {
    width: clamp(60px, 7vw, 80px);
    height: clamp(60px, 7vw, 80px);
    background: rgba(232, 221, 240, 0.5);
    bottom: 15%;
    right: 10%;
}

/* Animations */
.reveal { opacity: 0; transform: translateY(25px); transition: opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo); }
.visible .reveal:nth-child(1) { transition-delay: 0.1s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(2) { transition-delay: 0.2s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(3) { transition-delay: 0.3s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(4) { transition-delay: 0.4s; opacity: 1; transform: translateY(0); }

@media (max-width: 768px) {
    .split-container { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
}
</style>
</head>
<body>

<section class="slide" id="slide1">
    <div class="split-container">
        <!-- Peach left panel -->
        <div class="panel-peach">
            <div class="float-circle fc-1"></div>
            <div class="playful-badge badge-mint reveal">🌱 新手友好</div>
            <h1 class="reveal">轻松开启<br>新旅程</h1>
            <p class="reveal">已有五万多位用户从忙乱走向从容。无需信用卡，零门槛体验。</p>
            <div class="cta-row reveal">
                <button class="cta-btn cta-primary">创建账户 →</button>
                <button class="cta-btn cta-outline">了解更多</button>
            </div>
        </div>

        <!-- Lavender right panel -->
        <div class="panel-lavender">
            <div class="grid-pattern"></div>
            <div class="float-circle fc-2"></div>

            <div class="playful-badge badge-yellow reveal">✨ 你将获得</div>
            <h2 class="reveal">一切你需要的，都在这里。</h2>
            <ul class="checklist reveal">
                <li><span class="check-icon check-1">✓</span>不限数量的项目与任务</li>
                <li><span class="check-icon check-2">✓</span>团队协作工具</li>
                <li><span class="check-icon check-3">✓</span>智能截止日期提醒</li>
                <li><span class="check-icon check-1">✓</span>30 天无理由退款保障</li>
            </ul>
        </div>
    </div>
</section>

<script>
if (location.search.includes('thumb')) {
    document.querySelectorAll('.slide').forEach(s => s.classList.add('visible'));
} else {
    const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.2 });
    document.querySelectorAll('.slide').forEach(s => obs.observe(s));
}
</script>
</body>
</html>
