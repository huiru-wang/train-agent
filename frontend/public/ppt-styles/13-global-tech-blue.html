<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Tech Blue — 风格预览</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* === VIEWPORT BASE === */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow-x: hidden; }
.slide { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }
:root {
    --title-size: clamp(2rem, 5.5vw, 4.5rem);
    --h2-size: clamp(1.25rem, 3vw, 2rem);
    --body-size: clamp(0.85rem, 1.5vw, 1.125rem);
    --small-size: clamp(0.7rem, 1vw, 0.875rem);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}
@media (max-height: 600px) { :root { --title-size: clamp(1.5rem, 4vw, 2.5rem); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; } }

/* === GLOBAL TECH BLUE THEME === */
:root {
    --bg-primary: #ffffff;
    --bg-subtle: #f5f8fa;
    --accent-blue: #3a7bff;
    --accent-blue-soft: #4a90e2;
    --accent-blue-light: #e6f2ff;
    --accent-blue-pale: #b4d9ff;
    --text-primary: #292929;
    --text-secondary: #4a4a4a;
    --text-muted: #6b7280;
    --highlight-warm: #ffc000;
    --font-display: 'Noto Sans SC', sans-serif;
    --font-body: 'Noto Sans SC', sans-serif;
}

body {
    background: var(--bg-primary);
    font-family: var(--font-body);
    color: var(--text-primary);
}

/* Abstract globe: network sphere on the right */
.globe {
    position: absolute;
    right: calc(-1 * clamp(6rem, 15vw, 12rem));
    top: 50%;
    transform: translateY(-50%);
    width: clamp(18rem, 45vw, 36rem);
    height: clamp(18rem, 45vw, 36rem);
    border-radius: 50%;
    background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,0.25) 0%, transparent 40%),
        linear-gradient(135deg, var(--accent-blue-soft) 0%, var(--accent-blue) 100%);
    box-shadow:
        inset -20px -20px 60px rgba(0,0,0,0.08),
        0 20px 60px rgba(58, 123, 255, 0.18);
    opacity: 0.95;
    z-index: 0;
}
.globe::before {
    /* latitude / longitude grid lines */
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
        repeating-linear-gradient(0deg, transparent 0px, transparent 18%, rgba(255,255,255,0.28) 18%, rgba(255,255,255,0.28) 18.8%),
        repeating-linear-gradient(90deg, transparent 0px, transparent 18%, rgba(255,255,255,0.28) 18%, rgba(255,255,255,0.28) 18.8%),
        radial-gradient(circle at 50% 50%, transparent 60%, rgba(255,255,255,0.15) 100%);
    mask-image: radial-gradient(circle at 50% 50%, black 60%, transparent 100%);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, black 60%, transparent 100%);
}
.globe::after {
    /* orbit rings */
    content: '';
    position: absolute;
    inset: -12%;
    border-radius: 50%;
    border: 1px solid rgba(58, 123, 255, 0.25);
    transform: rotate(-20deg);
    background:
        radial-gradient(circle at 78% 22%, var(--highlight-warm) 0%, var(--highlight-warm) 4%, transparent 5%),
        radial-gradient(circle at 22% 78%, var(--accent-blue-pale) 0%, var(--accent-blue-pale) 3%, transparent 4%);
}
.globe-ring {
    position: absolute;
    right: calc(-1 * clamp(5rem, 13vw, 10rem));
    top: 50%;
    transform: translateY(-50%) rotate(25deg);
    width: clamp(20rem, 50vw, 40rem);
    height: clamp(20rem, 50vw, 40rem);
    border-radius: 50%;
    border: 1.5px solid rgba(58, 123, 255, 0.2);
    z-index: 0;
}
.globe-ring::before {
    content: '';
    position: absolute;
    inset: 12%;
    border-radius: 50%;
    border: 1px dashed rgba(58, 123, 255, 0.15);
}

/* Floating decorative dots & circles */
.deco-circle {
    position: absolute;
    border-radius: 50%;
    z-index: 0;
}
.deco-1 { width: clamp(1.5rem, 4vw, 3rem); height: clamp(1.5rem, 4vw, 3rem); background: var(--accent-blue); left: 6%; top: 18%; opacity: 0.9; }
.deco-2 { width: clamp(0.6rem, 1.5vw, 1.2rem); height: clamp(0.6rem, 1.5vw, 1.2rem); background: transparent; border: 2px solid var(--accent-blue); left: 12%; top: 10%; }
.deco-3 { width: clamp(0.4rem, 1vw, 0.8rem); height: clamp(0.4rem, 1vw, 0.8rem); background: var(--accent-blue-pale); left: 4%; top: 28%; }
.deco-4 { width: clamp(2rem, 5vw, 4rem); height: clamp(2rem, 5vw, 4rem); background: var(--accent-blue-pale); right: 8%; bottom: 12%; opacity: 0.5; }
.deco-5 { width: clamp(0.5rem, 1.2vw, 1rem); height: clamp(0.5rem, 1.2vw, 1rem); background: transparent; border: 1.5px solid var(--accent-blue-soft); right: 18%; bottom: 22%; }

/* Soft wave at bottom */
.wave {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: clamp(6rem, 15vh, 12rem);
    background: linear-gradient(180deg, transparent 0%, rgba(230, 242, 255, 0.6) 60%, rgba(230, 242, 255, 0.9) 100%);
    clip-path: ellipse(120% 100% at 50% 100%);
    z-index: 0;
}

/* Content wrapper */
.tech-wrapper {
    width: min(86vw, 1100px);
    padding: clamp(1.5rem, 4vw, 3rem);
    z-index: 2;
    position: relative;
    text-align: center;
}

/* Eyebrow */
.eyebrow {
    display: inline-block;
    font-size: var(--small-size);
    font-weight: 500;
    letter-spacing: 0.35em;
    color: var(--accent-blue);
    text-transform: uppercase;
    margin-bottom: clamp(0.75rem, 1.5vw, 1rem);
}

/* Title */
.tech-wrapper h1 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: var(--title-size);
    line-height: 1.15;
    color: var(--accent-blue);
    margin-bottom: clamp(0.5rem, 1vw, 0.75rem);
}

/* Subtitle */
.tech-subtitle {
    font-size: var(--body-size);
    color: var(--text-secondary);
    margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
}

/* CTA pill */
.cta-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.85em 2.2em;
    border-radius: 999px;
    background: var(--accent-blue);
    color: #ffffff;
    font-size: var(--body-size);
    font-weight: 500;
    text-decoration: none;
    box-shadow: 0 8px 24px rgba(58, 123, 255, 0.28);
}

/* Step cards row */
.cards {
    display: flex;
    gap: clamp(0.75rem, 2vw, 1.25rem);
    justify-content: center;
    flex-wrap: wrap;
    margin-top: clamp(1.5rem, 3vw, 2.5rem);
}
.step-card {
    width: clamp(7rem, 18vw, 10rem);
    padding: clamp(1rem, 2vw, 1.5rem);
    background: #ffffff;
    border: 1px solid var(--accent-blue-light);
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(58, 123, 255, 0.08);
    text-align: center;
}
.step-number {
    font-family: var(--font-display);
    font-size: var(--h2-size);
    font-weight: 900;
    color: var(--accent-blue);
    margin-bottom: 0.25em;
}
.step-label {
    font-size: var(--small-size);
    color: var(--text-secondary);
    line-height: 1.4;
}

/* Corner meta */
.meta-left {
    position: absolute;
    bottom: clamp(1rem, 2vw, 1.5rem);
    left: clamp(1.5rem, 3vw, 2.5rem);
    font-size: var(--small-size);
    color: var(--text-muted);
    z-index: 2;
}
.meta-right {
    position: absolute;
    bottom: clamp(1rem, 2vw, 1.5rem);
    right: clamp(1.5rem, 3vw, 2.5rem);
    font-size: var(--small-size);
    color: var(--text-muted);
    z-index: 2;
}

/* Animations */
.reveal { opacity: 0; transform: translateY(25px); transition: opacity 0.8s var(--ease-out-expo), transform 0.8s var(--ease-out-expo); }
.visible .reveal:nth-child(1) { transition-delay: 0.1s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(2) { transition-delay: 0.2s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(3) { transition-delay: 0.3s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(4) { transition-delay: 0.4s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(5) { transition-delay: 0.5s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(6) { transition-delay: 0.6s; opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<section class="slide" id="slide1">
    <!-- Background globe & decorations -->
    <div class="globe"></div>
    <div class="globe-ring"></div>
    <div class="deco-circle deco-1"></div>
    <div class="deco-circle deco-2"></div>
    <div class="deco-circle deco-3"></div>
    <div class="deco-circle deco-4"></div>
    <div class="deco-circle deco-5"></div>
    <div class="wave"></div>

    <div class="tech-wrapper">
        <div class="eyebrow reveal">互 / 联 / 网 / 产 / 品</div>
        <h1 class="reveal">7步持续进化闭环</h1>
        <p class="tech-subtitle reveal">积分赛玩法 · 在玩中学，在学中用，构建系统化的 AI 能力提升路径</p>
        <a href="#" class="cta-pill reveal">立即启动</a>

        <div class="cards reveal">
            <div class="step-card">
                <div class="step-number">01</div>
                <div class="step-label">现状分析</div>
            </div>
            <div class="step-card">
                <div class="step-number">02</div>
                <div class="step-label">目标设定</div>
            </div>
            <div class="step-card">
                <div class="step-number">03</div>
                <div class="step-label">知识输入</div>
            </div>
            <div class="step-card">
                <div class="step-number">04</div>
                <div class="step-label">实践输出</div>
            </div>
        </div>
    </div>

    <div class="meta-left reveal">AI 先锋项目组</div>
    <div class="meta-right reveal">2025</div>
</section>

<script>
if (location.search.includes('thumb')) {
    document.querySelectorAll('.slide').forEach(s => s.classList.add('visible'));
} else {
    const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.2 });
    document.querySelectorAll('.slide').forEach(s => obs.observe(s));
}
</script>
</body>
</html>
