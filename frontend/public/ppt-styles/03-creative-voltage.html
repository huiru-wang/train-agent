<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霓虹电压 — 风格预览</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* === VIEWPORT BASE === */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow-x: hidden; }
.slide { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; position: relative; }
:root {
    --title-size: clamp(1.5rem, 5vw, 4rem);
    --body-size: clamp(0.75rem, 1.5vw, 1.125rem);
    --small-size: clamp(0.65rem, 1vw, 0.875rem);
    --slide-padding: clamp(1rem, 4vw, 4rem);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}
@media (max-height: 600px) { :root { --title-size: clamp(1.1rem, 4vw, 2rem); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; } }

/* === CREATIVE VOLTAGE THEME === */
:root {
    --bg-primary: #0066ff;
    --bg-dark: #1a1a2e;
    --accent-neon: #d4ff00;
    --text-light: #ffffff;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
}

body { font-family: var(--font-mono); }

/* Split layout */
.split-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100%;
}
.panel-left {
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(1.5rem, 4vw, 4rem);
    position: relative;
    overflow: hidden;
}
.panel-right {
    background: var(--bg-dark);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(1.5rem, 4vw, 4rem);
    position: relative;
    overflow: hidden;
}

/* Halftone texture */
.halftone {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 12px 12px;
    pointer-events: none;
}
.panel-right .halftone {
    background-image: radial-gradient(circle, rgba(212,255,0,0.04) 1px, transparent 1px);
}

/* Left panel content */
.panel-left h1 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(2.5rem, 6vw, 5rem);
    line-height: 0.9;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: -0.02em;
    position: relative;
    z-index: 2;
}
.panel-left h1 .neon {
    color: var(--accent-neon);
    -webkit-text-stroke: 2px var(--accent-neon);
    -webkit-text-fill-color: transparent;
}

/* Mono label */
.mono-label {
    font-size: var(--small-size);
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
    position: relative;
    z-index: 2;
}

/* Right panel: neon badges */
.neon-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5em;
    background: var(--accent-neon);
    color: var(--bg-dark);
    padding: 0.4em 1.2em;
    border-radius: 100px;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: var(--small-size);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: clamp(0.5rem, 1vw, 1rem);
    box-shadow: 0 0 20px rgba(212, 255, 0, 0.4);
    width: fit-content;
}
.neon-badge.outline {
    background: transparent;
    border: 2px solid var(--accent-neon);
    color: var(--accent-neon);
    box-shadow: none;
}

.panel-right h2 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(1.5rem, 3.5vw, 2.5rem);
    color: var(--text-light);
    line-height: 1.1;
    margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
    position: relative;
    z-index: 2;
}
.panel-right p {
    font-size: var(--body-size);
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
    max-width: 400px;
    position: relative;
    z-index: 2;
}

/* Service tags */
.service-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: clamp(0.5rem, 1.5vw, 1rem);
    position: relative;
    z-index: 2;
}
.service-tag {
    font-family: var(--font-mono);
    font-size: var(--small-size);
    color: var(--accent-neon);
    border: 1px solid rgba(212, 255, 0, 0.3);
    padding: 0.3em 0.8em;
    border-radius: 4px;
}

/* Voltage meter decoration */
.voltage-decoration {
    position: absolute;
    top: clamp(1rem, 2vw, 1.5rem);
    right: clamp(1rem, 2vw, 1.5rem);
    font-family: var(--font-mono);
    font-size: var(--small-size);
    color: rgba(255,255,255,0.4);
    z-index: 2;
}

/* Animations */
.reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s var(--ease-out-expo), transform 0.7s var(--ease-out-expo); }
.visible .reveal:nth-child(1) { transition-delay: 0.1s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(2) { transition-delay: 0.25s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(3) { transition-delay: 0.4s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(4) { transition-delay: 0.55s; opacity: 1; transform: translateY(0); }

@media (max-width: 768px) {
    .split-container { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
}
</style>
</head>
<body>

<section class="slide" id="slide1">
    <div class="split-container">
        <!-- Left: electric blue -->
        <div class="panel-left">
            <div class="halftone"></div>
            <div class="voltage-decoration reveal">// 电压：240V</div>
            <div class="mono-label reveal">创意工作室 · 创立于 2019</div>
            <h1 class="reveal">释放你的<br><span class="neon">创造力</span></h1>
        </div>

        <!-- Right: dark -->
        <div class="panel-right">
            <div class="halftone"></div>
            <div class="neon-badge reveal">⚡ 2025 年度获奖</div>
            <h2 class="reveal">将大胆的想法变为令人震撞的体验。</h2>
            <p class="reveal">从品牌识别到沉浸式数字产品——我们工程师级的创意足以打动人心。</p>
            <div class="service-tags reveal">
                <span class="service-tag">品牌设计</span>
                <span class="service-tag">交互体验</span>
                <span class="service-tag">动态视觉</span>
                <span class="service-tag">策略</span>
            </div>
        </div>
    </div>
</section>

<script>
if (location.search.includes('thumb')) {
    document.querySelectorAll('.slide').forEach(s => s.classList.add('visible'));
} else {
    const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.2 });
    document.querySelectorAll('.slide').forEach(s => obs.observe(s));
}
</script>
</body>
</html>
