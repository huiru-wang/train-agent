<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电光蓝白 — 风格预览</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* === VIEWPORT BASE === */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow-x: hidden; }
.slide { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; position: relative; }
:root {
    --title-size: clamp(1.5rem, 5vw, 4rem);
    --h2-size: clamp(1.25rem, 3.5vw, 2.5rem);
    --body-size: clamp(0.75rem, 1.5vw, 1.125rem);
    --small-size: clamp(0.65rem, 1vw, 0.875rem);
    --slide-padding: clamp(1rem, 4vw, 4rem);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}
@media (max-height: 600px) { :root { --title-size: clamp(1.1rem, 4vw, 2rem); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; } }

/* === ELECTRIC STUDIO THEME === */
:root {
    --bg-dark: #0a0a0a;
    --bg-white: #ffffff;
    --accent-blue: #4361ee;
    --text-dark: #0a0a0a;
    --text-light: #ffffff;
    --font-display: 'Manrope', sans-serif;
    --font-body: 'Manrope', sans-serif;
}

body { font-family: var(--font-body); margin: 0; }

/* Split panel layout */
.slide {
    display: grid;
    grid-template-rows: 1fr 1fr;
}
.panel-white {
    background: var(--bg-white);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: clamp(2rem, 5vw, 5rem);
    position: relative;
}
.panel-blue {
    background: var(--accent-blue);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: clamp(2rem, 5vw, 5rem);
    position: relative;
}

/* Accent bar on panel edge */
.accent-bar {
    position: absolute;
    height: 4px;
    background: var(--accent-blue);
    left: clamp(2rem, 5vw, 5rem);
    right: clamp(2rem, 5vw, 5rem);
    bottom: 0;
}

/* Brand marks */
.brand-mark {
    position: absolute;
    top: clamp(1rem, 2vw, 1.5rem);
    font-size: var(--small-size);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.15em;
}
.brand-mark.top-left { left: clamp(2rem, 5vw, 5rem); }
.brand-mark.top-right { right: clamp(2rem, 5vw, 5rem); color: rgba(255,255,255,0.6); }

/* Typography */
.panel-white h1 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1.05;
    color: var(--text-dark);
    max-width: 600px;
}
.panel-white p {
    font-size: var(--body-size);
    font-weight: 500;
    color: #555;
    margin-top: clamp(0.5rem, 1.5vw, 1rem);
    max-width: 500px;
    line-height: 1.6;
}
.panel-blue blockquote {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(1.25rem, 3vw, 2rem);
    color: var(--text-light);
    line-height: 1.3;
    max-width: 550px;
}
.panel-blue cite {
    font-style: normal;
    font-size: var(--small-size);
    color: rgba(255,255,255,0.7);
    margin-top: clamp(0.5rem, 1vw, 1rem);
    display: block;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

/* Animations */
.reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s var(--ease-out-expo), transform 0.7s var(--ease-out-expo); }
.visible .reveal { opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(1) { transition-delay: 0.1s; }
.visible .reveal:nth-child(2) { transition-delay: 0.25s; }
.visible .reveal:nth-child(3) { transition-delay: 0.4s; }

/* Stats row */
.stats {
    display: flex;
    gap: clamp(1.5rem, 3vw, 3rem);
    margin-top: clamp(0.5rem, 1.5vw, 1.5rem);
}
.stat-item { display: flex; flex-direction: column; }
.stat-num { font-family: var(--font-display); font-weight: 800; font-size: clamp(1.5rem, 3vw, 2.5rem); color: var(--accent-blue); }
.stat-label { font-size: var(--small-size); color: #777; text-transform: uppercase; letter-spacing: 0.05em; }
</style>
</head>
<body>

<section class="slide" id="slide1">
    <!-- White top panel -->
    <div class="panel-white">
        <div class="brand-mark top-left reveal">电光蓝白</div>
        <h1 class="reveal">精准与高效</h1>
        <p class="reveal">为现代企业提供战略级解决方案。我们不臆测——我们测量、迭代、交付。</p>
        <div class="stats reveal">
            <div class="stat-item">
                <span class="stat-num">97%</span>
                <span class="stat-label">客户留存率</span>
            </div>
            <div class="stat-item">
                <span class="stat-num">$2.4B</span>
                <span class="stat-label">创造价值</span>
            </div>
            <div class="stat-item">
                <span class="stat-num">180+</span>
                <span class="stat-label">服务案例</span>
            </div>
        </div>
        <div class="accent-bar"></div>
    </div>

    <!-- Blue bottom panel -->
    <div class="panel-blue">
        <div class="brand-mark top-right reveal">2025</div>
        <blockquote class="reveal">"优秀与卓越的区别，在于是否愿意质疑每一个假设。"</blockquote>
        <cite class="reveal">— 陈莎拉，首席执行官</cite>
    </div>
</section>

<script>
if (location.search.includes('thumb')) {
    document.querySelectorAll('.slide').forEach(s => s.classList.add('visible'));
} else {
    const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.2 });
    document.querySelectorAll('.slide').forEach(s => obs.observe(s));
}
</script>
</body>
</html>
