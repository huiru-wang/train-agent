<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纸墨书香 — 风格预览</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* === VIEWPORT BASE === */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow-x: hidden; }
.slide { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }
:root {
    --title-size: clamp(2rem, 5.5vw, 4.5rem);
    --h2-size: clamp(1.25rem, 3vw, 2rem);
    --body-size: clamp(0.85rem, 1.5vw, 1.125rem);
    --small-size: clamp(0.7rem, 1vw, 0.875rem);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}
@media (max-height: 600px) { :root { --title-size: clamp(1.5rem, 4vw, 2.5rem); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; } }

/* === PAPER & INK THEME === */
:root {
    --bg-cream: #faf9f7;
    --bg-warm: #f5f3ef;
    --text-charcoal: #1a1a1a;
    --text-secondary: #4a4a4a;
    --text-muted: #8a8580;
    --accent-crimson: #c41e3a;
    --rule-color: rgba(26, 26, 26, 0.12);
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'Source Serif 4', serif;
}

body { background: var(--bg-cream); font-family: var(--font-body); color: var(--text-charcoal); }

/* Paper texture (subtle noise via gradient) */
.slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
        radial-gradient(circle at 25% 25%, rgba(196, 30, 58, 0.02) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(0, 0, 0, 0.015) 0%, transparent 50%);
    pointer-events: none;
}

/* Content */
.essay-wrapper {
    max-width: 680px;
    padding: clamp(1.5rem, 4vw, 3rem);
    z-index: 2;
    position: relative;
}

/* Masthead */
.masthead {
    text-align: center;
    margin-bottom: clamp(1rem, 2vw, 1.5rem);
}
.masthead .pub-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: var(--small-size);
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--text-muted);
}

/* Elegant horizontal rule */
.elegant-rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin: clamp(0.5rem, 1.5vw, 1rem) 0;
}
.elegant-rule::before,
.elegant-rule::after {
    content: '';
    flex: 1;
    max-width: 100px;
    height: 1px;
    background: var(--rule-color);
}
.elegant-rule .ornament {
    color: var(--accent-crimson);
    font-size: var(--small-size);
}

/* Title */
.essay-wrapper h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: var(--title-size);
    line-height: 1.05;
    text-align: center;
    color: var(--text-charcoal);
    margin-bottom: clamp(0.5rem, 1vw, 0.75rem);
}
.essay-wrapper h1 em {
    font-style: italic;
    color: var(--accent-crimson);
}

/* Subtitle */
.essay-subtitle {
    text-align: center;
    font-size: var(--body-size);
    font-style: italic;
    color: var(--text-secondary);
    margin-bottom: clamp(1rem, 2vw, 1.5rem);
    max-width: 450px;
    margin-left: auto;
    margin-right: auto;
}

/* Body with drop cap */
.essay-body {
    font-size: var(--body-size);
    line-height: 1.75;
    color: var(--text-secondary);
    max-width: 540px;
    margin: 0 auto;
}
.essay-body .drop-cap {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(3rem, 5vw, 4.5rem);
    float: left;
    line-height: 0.85;
    margin-right: 0.08em;
    margin-top: 0.05em;
    color: var(--accent-crimson);
}

/* Pull quote */
.pull-quote {
    margin: clamp(1rem, 2vw, 1.5rem) auto;
    max-width: 480px;
    padding: clamp(0.5rem, 1.5vw, 1rem) 0;
    border-top: 1px solid var(--rule-color);
    border-bottom: 1px solid var(--rule-color);
}
.pull-quote blockquote {
    font-family: var(--font-display);
    font-style: italic;
    font-size: var(--h2-size);
    line-height: 1.3;
    color: var(--text-charcoal);
    text-align: center;
}
.pull-quote cite {
    display: block;
    text-align: center;
    font-style: normal;
    font-size: var(--small-size);
    color: var(--text-muted);
    margin-top: 0.5em;
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

/* Byline */
.byline {
    text-align: center;
    margin-top: clamp(1rem, 2vw, 1.5rem);
    font-size: var(--small-size);
    color: var(--text-muted);
}
.byline .author {
    font-family: var(--font-display);
    font-weight: 600;
    color: var(--text-charcoal);
}

/* Corner labels */
.folio {
    position: absolute;
    font-family: var(--font-display);
    font-size: var(--small-size);
    color: var(--text-muted);
    font-style: italic;
}
.folio-left { bottom: clamp(1rem, 2vw, 1.5rem); left: clamp(1.5rem, 3vw, 2.5rem); }
.folio-right { bottom: clamp(1rem, 2vw, 1.5rem); right: clamp(1.5rem, 3vw, 2.5rem); }

/* Animations */
.reveal { opacity: 0; transform: translateY(25px); transition: opacity 0.8s var(--ease-out-expo), transform 0.8s var(--ease-out-expo); }
.visible .reveal:nth-child(1) { transition-delay: 0.15s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(2) { transition-delay: 0.3s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(3) { transition-delay: 0.45s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(4) { transition-delay: 0.6s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(5) { transition-delay: 0.75s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(6) { transition-delay: 0.9s; opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<section class="slide" id="slide1">
    <div class="essay-wrapper">
        <div class="masthead reveal">
            <span class="pub-name">静评</span>
        </div>

        <div class="elegant-rule reveal">
            <span class="ornament">❦</span>
        </div>

        <h1 class="reveal">论<em>故事</em>的<br>本质</h1>
        <p class="essay-subtitle reveal">关于我们为何讲述，以及它们回赠我们什么。</p>

        <div class="essay-body reveal">
            <p><span class="drop-cap">每</span>个故事都始于一段沉默——第一个词出现之前的空间。正是这段沉默中，所有可能性如形未定地存在着、等待着。我们讲述故事，不是为了填满虚空，而是为了塑造它，赋予它意义与方向。</p>
        </div>

        <div class="pull-quote reveal">
            <blockquote>"故事不是被讲述的，而是被忆起的。"</blockquote>
            <cite>— 摘自页边笔记</cite>
        </div>

        <div class="byline reveal">
            文字 <span class="author">埃莉诺·万斯</span> · 第 XII 期
        </div>
    </div>

    <div class="folio folio-left reveal">第 14 页</div>
    <div class="folio folio-right reveal">二〇二五</div>
</section>

<script>
if (location.search.includes('thumb')) {
    document.querySelectorAll('.slide').forEach(s => s.classList.add('visible'));
} else {
    const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.2 });
    document.querySelectorAll('.slide').forEach(s => obs.observe(s));
}
</script>
</body>
</html>
