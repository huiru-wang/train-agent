<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>墨纸杂志 · 风格预览</title>

  <!-- Fonts: 国内可访问的 Google Fonts 镜像 -->
  <link rel="preconnect" href="https://fonts.loli.net" />
  <link rel="stylesheet" href="https://fonts.loli.net/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=IBM+Plex+Sans:wght@400;500;700&display=swap" />

  <style>
    /* ===========================================
       VIEWPORT FITTING: MANDATORY BASE STYLES
       Include this ENTIRE file in every presentation.
       These styles ensure slides fit exactly in the viewport.
       =========================================== */

    /* 1. Lock html/body to viewport */
    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    html {
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }

    /* 2. Each slide = exact viewport height */
    .slide {
      width: 100vw;
      height: 100vh;
      height: 100dvh; /* Dynamic viewport height for mobile browsers */
      overflow: hidden; /* CRITICAL: Prevent ANY overflow */
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 3. Content container with flex for centering */
    .slide-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-height: 100%;
      overflow: hidden; /* Double-protection against overflow */
      padding: var(--slide-padding);
    }

    /* 4. ALL typography uses clamp() for responsive scaling */
    :root {
      /* Titles scale from mobile to desktop */
      --title-size: clamp(1.5rem, 5vw, 4rem);
      --h2-size: clamp(1.25rem, 3.5vw, 2.5rem);
      --h3-size: clamp(1rem, 2.5vw, 1.75rem);

      /* Body text */
      --body-size: clamp(0.75rem, 1.5vw, 1.125rem);
      --small-size: clamp(0.65rem, 1vw, 0.875rem);

      /* Spacing scales with viewport */
      --slide-padding: clamp(1rem, 4vw, 4rem);
      --content-gap: clamp(0.5rem, 2vw, 2rem);
      --element-gap: clamp(0.25rem, 1vw, 1rem);
    }

    /* 5. Cards/containers use viewport-relative max sizes */
    .card, .container, .content-box {
      max-width: min(90vw, 1000px);
      max-height: min(80vh, 700px);
    }

    /* 6. Lists auto-scale with viewport */
    .feature-list, .bullet-list {
      gap: clamp(0.4rem, 1vh, 1rem);
    }

    .feature-list li, .bullet-list li {
      font-size: var(--body-size);
      line-height: 1.4;
    }

    /* 7. Grids adapt to available space */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 250px), 1fr));
      gap: clamp(0.5rem, 1.5vw, 1rem);
    }

    /* 8. Images constrained to viewport */
    img, .image-container {
      max-width: 100%;
      max-height: min(50vh, 400px);
      object-fit: contain;
    }

    /* ===========================================
       RESPONSIVE BREAKPOINTS
       Aggressive scaling for smaller viewports
       =========================================== */

    /* Short viewports (< 700px height) */
    @media (max-height: 700px) {
      :root {
        --slide-padding: clamp(0.75rem, 3vw, 2rem);
        --content-gap: clamp(0.4rem, 1.5vw, 1rem);
        --title-size: clamp(1.25rem, 4.5vw, 2.5rem);
        --h2-size: clamp(1rem, 3vw, 1.75rem);
      }
    }

    /* Very short viewports (< 600px height) */
    @media (max-height: 600px) {
      :root {
        --slide-padding: clamp(0.5rem, 2.5vw, 1.5rem);
        --content-gap: clamp(0.3rem, 1vw, 0.75rem);
        --title-size: clamp(1.1rem, 4vw, 2rem);
        --body-size: clamp(0.7rem, 1.2vw, 0.95rem);
      }

      /* Hide non-essential elements */
      .nav-dots, .decorative {
        display: none;
      }
    }

    /* Extremely short (landscape phones, < 500px height) */
    @media (max-height: 500px) {
      :root {
        --slide-padding: clamp(0.4rem, 2vw, 1rem);
        --title-size: clamp(1rem, 3.5vw, 1.5rem);
        --h2-size: clamp(0.9rem, 2.5vw, 1.25rem);
        --body-size: clamp(0.65rem, 1vw, 0.85rem);
      }
    }

    /* Narrow viewports (< 600px width) */
    @media (max-width: 600px) {
      :root {
        --title-size: clamp(1.25rem, 7vw, 2.5rem);
      }

      /* Stack grids vertically */
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* ===========================================
       REDUCED MOTION
       Respect user preferences
       =========================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.2s !important;
      }

      html {
        scroll-behavior: auto;
      }
    }

    /* ===========================================
       THEME: 墨水经典（Monocle）
       严格使用风格模版预设，不混搭色值。
       =========================================== */
    :root {
      --bg-primary: #f1efea;
      --bg-secondary: #e8e5de;
      --text-primary: #0a0a0b;
      --text-secondary: #5a5a58;
      --accent-main: #0a0a0b;
      --accent-highlight: #0a0a0b;
      --accent-muted: #d8d5ce;
      --surface: #e8e5de;

      --font-display: "Playfair Display", "Noto Serif SC", serif;
      --font-serif-cn: "Noto Serif SC", "Source Serif 4", serif;
      --font-sans: "IBM Plex Sans", "Noto Sans SC", sans-serif;
      --font-mono: "IBM Plex Mono", monospace;

      --hero-size: clamp(3rem, 11vw, 9rem);
      --subtitle-size: clamp(0.875rem, 2vw, 1.75rem);
      --body-size: clamp(0.8rem, 1.4vw, 1.125rem);
      --small-size: clamp(0.65rem, 1vw, 0.875rem);

      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-normal: 0.8s;
    }

    /* ===========================================
       BASE RESET
       =========================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===========================================
       REVEAL ANIMATIONS
       =========================================== */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition:
        opacity var(--duration-normal) var(--ease-out-expo),
        transform var(--duration-normal) var(--ease-out-expo);
    }

    .slide.visible .reveal {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal:nth-child(1) { transition-delay: 0.1s; }
    .reveal:nth-child(2) { transition-delay: 0.2s; }
    .reveal:nth-child(3) { transition-delay: 0.3s; }
    .reveal:nth-child(4) { transition-delay: 0.4s; }
    .reveal:nth-child(5) { transition-delay: 0.5s; }
    .reveal:nth-child(6) { transition-delay: 0.6s; }

    /* ===========================================
       COVER SLIDE: HERO DARK
       深色仪式背景，让衬线大字成为绝对视觉重音。
       =========================================== */
    .title-slide {
      background: var(--text-primary);
      color: var(--bg-primary);
    }

    /* 背景氛围层：极淡的径向渐变 + 颗粒噪点 */
    .bg-atmosphere {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(241, 239, 234, 0.06) 0%, transparent 45%),
        radial-gradient(ellipse at 80% 80%, rgba(241, 239, 234, 0.04) 0%, transparent 40%),
        var(--text-primary);
    }

    .bg-atmosphere::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.04;
      mix-blend-mode: overlay;
    }

    /* 巨型背景字：低透明度装饰 */
    .ink-watermark {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
      pointer-events: none;
      font-family: var(--font-display);
      font-size: clamp(10rem, 35vw, 30rem);
      font-weight: 900;
      color: var(--bg-primary);
      opacity: 0;
      letter-spacing: -0.05em;
      transform: scale(0.95);
      transition:
        opacity 1.2s var(--ease-out-expo),
        transform 1.2s var(--ease-out-expo);
    }

    .slide.visible .ink-watermark {
      opacity: 0.035;
      transform: scale(1);
    }

    /* 杂志页眉 / 页脚 */
    .mag-header,
    .mag-footer {
      position: absolute;
      left: var(--slide-padding);
      right: var(--slide-padding);
      z-index: 2;
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: var(--small-size);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--bg-primary);
      opacity: 0.65;
    }

    .mag-header { top: var(--slide-padding); }
    .mag-footer { bottom: var(--slide-padding); }

    /* 封面内容居中对齐 */
    .title-slide .slide-content {
      position: relative;
      z-index: 1;
      align-items: center;
      text-align: center;
    }

    /* 引导小字（Mono 全大写） */
    .hero-kicker {
      font-family: var(--font-mono);
      font-size: var(--small-size);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: var(--bg-primary);
      opacity: 0.6;
      margin-bottom: var(--element-gap);
    }

    /* 超大主标题：衬线大字 */
    .hero-title {
      font-family: var(--font-serif-cn);
      font-size: var(--hero-size);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--bg-primary);
      margin-bottom: var(--content-gap);
    }

    /* 副标题 */
    .hero-subtitle {
      font-family: var(--font-serif-cn);
      font-size: var(--subtitle-size);
      font-weight: 400;
      color: var(--bg-primary);
      opacity: 0.85;
      margin-bottom: var(--element-gap);
    }

    /* 引导段 */
    .hero-lead {
      font-family: var(--font-sans);
      font-size: var(--body-size);
      line-height: 1.75;
      max-width: min(64ch, 72vw);
      color: var(--bg-primary);
      opacity: 0.7;
      margin-bottom: var(--content-gap);
    }

    /* 元数据标签行 */
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(0.5rem, 1.5vw, 1rem);
      font-family: var(--font-mono);
      font-size: var(--small-size);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--bg-primary);
    }

    .meta-row span {
      padding: 0.4em 0.9em;
      border: 1px solid rgba(241, 239, 234, 0.25);
      border-radius: 999px;
      opacity: 0.8;
    }

    /* ===========================================
       PROGRESS BAR & NAV DOTS
       =========================================== */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      width: 100%;
      z-index: 100;
      background: rgba(241, 239, 234, 0.12);
    }

    .progress-bar::after {
      content: "";
      display: block;
      height: 100%;
      width: 100%;
      background: var(--bg-primary);
      transform-origin: left;
      transform: scaleX(1);
      transition: transform 0.4s var(--ease-out-expo);
    }

    .nav-dots {
      position: fixed;
      right: var(--slide-padding);
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .nav-dots button {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid rgba(241, 239, 234, 0.35);
      background: transparent;
      cursor: pointer;
      padding: 0;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .nav-dots button.active {
      background: var(--bg-primary);
      border-color: var(--bg-primary);
    }

    /* ===========================================
       INLINE EDITING UI
       =========================================== */
    .edit-hotzone {
      position: fixed;
      top: 0;
      left: 0;
      width: 80px;
      height: 80px;
      z-index: 10000;
      cursor: pointer;
    }

    .edit-toggle {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10001;
      padding: 0.45rem 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--bg-primary);
      color: var(--text-primary);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .edit-toggle.show,
    .edit-toggle.active {
      opacity: 1;
      pointer-events: auto;
    }

    body.edit-active [contenteditable="true"] {
      outline: 1px dashed rgba(241, 239, 234, 0.5);
      outline-offset: 4px;
      cursor: text;
    }

    /* ===========================================
       SMALL VIEWPORT TWEAKS FOR COVER
       =========================================== */
    @media (max-width: 600px) {
      .hero-title {
        letter-spacing: -0.02em;
      }
      .meta-row span {
        padding: 0.35em 0.7em;
      }
    }
  </style>
</head>
<body>
  <!-- Progress indicator -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- Slide navigation dots -->
  <nav class="nav-dots" id="navDots" aria-label="幻灯片导航"></nav>

  <!-- Edit mode trigger -->
  <div class="edit-hotzone" aria-hidden="true"></div>
  <button class="edit-toggle" id="editToggle" title="编辑模式 (E)">✏️ 编辑</button>

  <!-- COVER SLIDE -->
  <section class="slide title-slide" id="slide-1" aria-label="封面">
    <div class="bg-atmosphere"></div>
    <div class="ink-watermark" aria-hidden="true">INK</div>

    <header class="mag-header">
      <span>Style Preview</span>
      <span>Vol. 01</span>
    </header>

    <div class="slide-content">
      <p class="hero-kicker reveal">Magazine Ink</p>
      <h1 class="hero-title reveal">墨纸杂志</h1>
      <p class="hero-subtitle reveal">纯墨黑与暖米白的高对比纸媒美学</p>
      <p class="hero-lead reveal">
        克制、沉浸、有编辑感。以衬线大字作为视觉重音，以等宽小字作为节奏装饰，介于独立杂志与学术期刊之间的阅读气质。
      </p>
      <div class="meta-row reveal">
        <span>纸媒感</span>
        <span>高对比</span>
        <span>衬线重音</span>
        <span>强留白</span>
      </div>
    </div>

    <footer class="mag-footer">
      <span>2026 · 风格预览</span>
      <span>Cover</span>
    </footer>
  </section>

  <script>
    /* ===========================================
       SLIDE PRESENTATION CONTROLLER
       =========================================== */
    class SlidePresentation {
      constructor() {
        this.slides = document.querySelectorAll('.slide');
        this.totalSlides = this.slides.length;
        this.currentIndex = 0;
        this.isScrolling = false;
        this.progressBar = document.getElementById('progressBar');
        this.navDots = document.getElementById('navDots');

        this.setupObserver();
        this.setupKeyboardNav();
        this.setupTouchNav();
        this.setupWheelNav();
        this.setupNavDots();
        this.updateUI();
      }

      setupObserver() {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              this.currentIndex = Array.from(this.slides).indexOf(entry.target);
              this.updateUI();
            }
          });
        }, { threshold: 0.3 });

        this.slides.forEach(s => observer.observe(s));
      }

      setupKeyboardNav() {
        document.addEventListener('keydown', (e) => {
          if (e.target.isContentEditable) return;

          if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
            e.preventDefault();
            this.goTo(this.currentIndex + 1);
          } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'PageUp') {
            e.preventDefault();
            this.goTo(this.currentIndex - 1);
          } else if (e.key === 'Home') {
            e.preventDefault();
            this.goTo(0);
          } else if (e.key === 'End') {
            e.preventDefault();
            this.goTo(this.totalSlides - 1);
          }
        });
      }

      setupTouchNav() {
        let startY = 0;
        document.addEventListener('touchstart', (e) => {
          if (e.target.isContentEditable) return;
          startY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
          if (e.target.isContentEditable) return;
          const diff = startY - e.changedTouches[0].clientY;
          if (Math.abs(diff) > 50) {
            this.goTo(this.currentIndex + (diff > 0 ? 1 : -1));
          }
        }, { passive: true });
      }

      setupWheelNav() {
        document.addEventListener('wheel', (e) => {
          if (this.isScrolling) return;
          this.isScrolling = true;
          setTimeout(() => { this.isScrolling = false; }, 800);
          if (e.deltaY > 0) this.goTo(this.currentIndex + 1);
          else if (e.deltaY < 0) this.goTo(this.currentIndex - 1);
        }, { passive: true });
      }

      goTo(index) {
        if (index < 0 || index >= this.totalSlides) return;
        this.slides[index].scrollIntoView({ behavior: 'smooth' });
      }

      setupNavDots() {
        if (!this.navDots) return;
        this.navDots.innerHTML = '';
        for (let i = 0; i < this.totalSlides; i++) {
          const btn = document.createElement('button');
          btn.setAttribute('aria-label', `幻灯片 ${i + 1}`);
          btn.addEventListener('click', () => this.goTo(i));
          this.navDots.appendChild(btn);
        }
        this.dots = this.navDots.querySelectorAll('button');
      }

      updateUI() {
        if (this.progressBar) {
          const scale = (this.currentIndex + 1) / this.totalSlides;
          this.progressBar.style.setProperty('--progress', scale);
          this.progressBar.querySelector?.('::after') || (this.progressBar.style.background = `linear-gradient(to right, var(--bg-primary) ${scale * 100}%, rgba(241,239,234,0.12) ${scale * 100}%)`);
        }
        if (this.dots) {
          this.dots.forEach((dot, i) => dot.classList.toggle('active', i === this.currentIndex));
        }
      }
    }

    /* ===========================================
       INLINE EDITOR
       =========================================== */
    class InlineEditor {
      constructor() {
        this.isActive = false;
        this.toggleBtn = document.getElementById('editToggle');
        this.hotzone = document.querySelector('.edit-hotzone');
        this.hideTimeout = null;

        this.setupToggle();
        this.setupHotzone();
        this.setupAutoSave();
        this.setupExport();
      }

      setupToggle() {
        this.toggleBtn.addEventListener('click', () => this.toggleEditMode());
      }

      setupHotzone() {
        const show = () => {
          clearTimeout(this.hideTimeout);
          this.toggleBtn.classList.add('show');
        };
        const hide = () => {
          this.hideTimeout = setTimeout(() => {
            if (!this.isActive) this.toggleBtn.classList.remove('show');
          }, 400);
        };

        this.hotzone.addEventListener('mouseenter', show);
        this.hotzone.addEventListener('mouseleave', hide);
        this.toggleBtn.addEventListener('mouseenter', show);
        this.toggleBtn.addEventListener('mouseleave', hide);
        this.hotzone.addEventListener('click', () => this.toggleEditMode());
      }

      toggleEditMode() {
        this.isActive = !this.isActive;
        document.body.classList.toggle('edit-active', this.isActive);
        this.toggleBtn.classList.toggle('active', this.isActive);
        this.toggleBtn.textContent = this.isActive ? '✓ 完成' : '✏️ 编辑';

        const textElements = document.querySelectorAll(
          'h1, h2, h3, h4, p, li, .hero-kicker, .meta-row span, .mag-header span, .mag-footer span'
        );
        textElements.forEach(el => {
          if (this.isActive) {
            el.setAttribute('contenteditable', 'true');
          } else {
            el.removeAttribute('contenteditable');
          }
        });
      }

      setupAutoSave() {
        const key = 'ppt-' + document.title;
        const saved = localStorage.getItem(key);
        if (saved) {
          try {
            JSON.parse(saved).forEach(item => {
              const el = document.querySelector(`[data-edit-id="${item.id}"]`);
              if (el) el.innerHTML = item.html;
            });
          } catch (e) {}
        }

        document.addEventListener('input', (e) => {
          if (e.target.isContentEditable) {
            const editable = document.querySelectorAll('[contenteditable="true"]');
            const data = Array.from(editable).map(el => {
              if (!el.dataset.editId) {
                el.dataset.editId = 'ed-' + Math.random().toString(36).slice(2, 10);
              }
              return { id: el.dataset.editId, html: el.innerHTML };
            });
            localStorage.setItem(key, JSON.stringify(data));
          }
        });
      }

      setupExport() {
        document.addEventListener('keydown', (e) => {
          if ((e.key === 's' || e.key === 'S') && (e.ctrlKey || e.metaKey) && this.isActive) {
            e.preventDefault();
            this.exportFile();
          }
        });
      }

      exportFile() {
        const editableEls = Array.from(document.querySelectorAll('[contenteditable]'));
        editableEls.forEach(el => el.removeAttribute('contenteditable'));
        document.body.classList.remove('edit-active');
        this.toggleBtn?.classList.remove('active', 'show');

        const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

        document.body.classList.add('edit-active');
        editableEls.forEach(el => el.setAttribute('contenteditable', 'true'));
        this.toggleBtn?.classList.add('active');

        const blob = new Blob([html], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'magazine-ink-cover-preview.html';
        a.click();
        URL.revokeObjectURL(a.href);
      }
    }

    /* Keyboard shortcut for edit mode */
    const editor = new InlineEditor();
    document.addEventListener('keydown', (e) => {
      if ((e.key === 'e' || e.key === 'E') && !e.target.isContentEditable) {
        editor.toggleEditMode();
      }
    });

    new SlidePresentation();
  </script>
</body>
</html>
