<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活页便签 — 风格预览</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
/* === VIEWPORT BASE === */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow-x: hidden; }
.slide { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; position: relative; }
:root {
    --title-size: clamp(1.5rem, 5vw, 3.5rem);
    --h2-size: clamp(1.25rem, 3vw, 2rem);
    --body-size: clamp(0.75rem, 1.4vw, 1rem);
    --small-size: clamp(0.65rem, 1vw, 0.875rem);
    --slide-padding: clamp(1rem, 3vw, 3rem);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}
@media (max-height: 600px) { :root { --title-size: clamp(1.1rem, 4vw, 2rem); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; } }

/* === NOTEBOOK TABS THEME === */
:root {
    --bg-outer: #2d2d2d;
    --bg-page: #f8f6f1;
    --text-primary: #1a1a1a;
    --tab-1: #98d4bb;
    --tab-2: #c7b8ea;
    --tab-3: #f4b8c5;
    --tab-4: #a8d8ea;
    --tab-5: #ffe6a7;
    --font-display: 'Bodoni Moda', serif;
    --font-body: 'DM Sans', sans-serif;
}

body { background: var(--bg-outer); font-family: var(--font-body); }

/* Paper container */
.paper {
    position: absolute;
    inset: clamp(1rem, 3vh, 2rem);
    left: clamp(2rem, 4vw, 3.5rem);
    right: clamp(2.5rem, 5vw, 4rem);
    background: var(--bg-page);
    border-radius: 4px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    padding: clamp(1.5rem, 4vw, 3rem);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Binder holes */
.binder-holes {
    position: absolute;
    left: clamp(0.5rem, 1.5vw, 1rem);
    top: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    padding: clamp(1rem, 3vh, 2rem) 0;
}
.binder-hole {
    width: clamp(8px, 1vw, 12px);
    height: clamp(8px, 1vw, 12px);
    border-radius: 50%;
    background: var(--bg-outer);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
}

/* Colorful tabs on right edge */
.tabs {
    position: absolute;
    right: 0;
    top: clamp(2rem, 5vh, 3rem);
    display: flex;
    flex-direction: column;
    gap: clamp(2px, 0.5vh, 6px);
}
.tab {
    width: clamp(30px, 4vw, 50px);
    border-radius: 0 8px 8px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: clamp(0.5rem, 1vh, 0.7rem);
    font-weight: 500;
    color: rgba(0,0,0,0.6);
    text-transform: uppercase;
    letter-spacing: 0.1em;
}
.tab-1 { height: clamp(50px, 12vh, 90px); background: var(--tab-1); }
.tab-2 { height: clamp(60px, 14vh, 100px); background: var(--tab-2); }
.tab-3 { height: clamp(70px, 16vh, 120px); background: var(--tab-3); }
.tab-4 { height: clamp(55px, 13vh, 95px); background: var(--tab-4); }
.tab-5 { height: clamp(45px, 11vh, 80px); background: var(--tab-5); }
.tab.active { box-shadow: 2px 0 8px rgba(0,0,0,0.15); width: clamp(35px, 4.5vw, 55px); }

/* Content */
.page-content {
    margin-left: clamp(1.5rem, 3vw, 2.5rem);
    margin-right: clamp(2rem, 4vw, 3rem);
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: clamp(0.5rem, 2vw, 1.5rem);
    border-bottom: 1px solid rgba(0,0,0,0.1);
    padding-bottom: clamp(0.5rem, 1vw, 1rem);
}
.page-header .issue { font-size: var(--small-size); color: #888; text-transform: uppercase; letter-spacing: 0.1em; }
.page-header .date { font-size: var(--small-size); color: #aaa; font-style: italic; }

.page-content h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: var(--title-size);
    line-height: 1.05;
    color: var(--text-primary);
    margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
}
.page-content h1 em { font-style: italic; font-weight: 400; }

.lead-text {
    font-size: var(--body-size);
    line-height: 1.7;
    color: #444;
    max-width: 500px;
    margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
}

/* Course list */
.course-list {
    list-style: none;
    margin-top: clamp(0.5rem, 1.5vw, 1rem);
}
.course-list li {
    display: flex;
    align-items: baseline;
    gap: clamp(0.5rem, 1vw, 1rem);
    padding: clamp(0.3rem, 0.8vw, 0.6rem) 0;
    border-bottom: 1px dotted rgba(0,0,0,0.1);
    font-size: var(--body-size);
}
.course-num {
    font-family: var(--font-display);
    font-weight: 700;
    color: var(--tab-1);
    min-width: 2em;
}
.course-name { color: var(--text-primary); font-weight: 500; flex: 1; }
.course-meta { color: #999; font-size: var(--small-size); }

/* Animations */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo); }
.visible .reveal:nth-child(1) { transition-delay: 0.1s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(2) { transition-delay: 0.2s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(3) { transition-delay: 0.3s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(4) { transition-delay: 0.4s; opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<section class="slide" id="slide1">
    <div class="paper">
        <!-- Binder holes -->
        <div class="binder-holes">
            <div class="binder-hole"></div>
            <div class="binder-hole"></div>
            <div class="binder-hole"></div>
            <div class="binder-hole"></div>
            <div class="binder-hole"></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab tab-1 active reveal">快速上手</div>
            <div class="tab tab-2 reveal">课程</div>
            <div class="tab tab-3 reveal">项目</div>
            <div class="tab tab-4 reveal">资料</div>
            <div class="tab tab-5 reveal">社区</div>
        </div>

        <!-- Content -->
        <div class="page-content">
            <div class="page-header reveal">
                <span class="issue">第 12 期 · 学习实验室</span>
                <span class="date">2025 年秋季</span>
            </div>
            <h1 class="reveal">学习<em>实验室</em></h1>
            <p class="lead-text reveal">为好奇心灵打造的精选空间。碎片化课程、实战项目，以及共同成长的社区。</p>
            <ul class="course-list reveal">
                <li><span class="course-num">01</span><span class="course-name">设计系统基础</span><span class="course-meta">12 节课</span></li>
                <li><span class="course-num">02</span><span class="course-name">网页字体排印</span><span class="course-meta">8 节课</span></li>
                <li><span class="course-num">03</span><span class="course-name">CSS 架构模式</span><span class="course-meta">15 节课</span></li>
            </ul>
        </div>
    </div>
</section>

<script>
if (location.search.includes('thumb')) {
    document.querySelectorAll('.slide').forEach(s => s.classList.add('visible'));
} else {
    const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.2 });
    document.querySelectorAll('.slide').forEach(s => obs.observe(s));
}
</script>
</body>
</html>
