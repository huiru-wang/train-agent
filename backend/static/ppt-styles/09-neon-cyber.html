<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霓虹赛博 — 风格预览</title>
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@400,700&f[]=satoshi@400,500,700&display=swap">
<style>
/* === VIEWPORT BASE === */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow-x: hidden; }
.slide { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }
:root {
    --title-size: clamp(2rem, 6vw, 5rem);
    --h2-size: clamp(1.25rem, 3vw, 2rem);
    --body-size: clamp(0.8rem, 1.4vw, 1.125rem);
    --small-size: clamp(0.65rem, 1vw, 0.875rem);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}
@media (max-height: 600px) { :root { --title-size: clamp(1.5rem, 4vw, 2.5rem); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; } }

/* === NEON CYBER THEME === */
:root {
    --bg-deep: #0a0f1c;
    --bg-card: rgba(255,255,255,0.03);
    --accent-cyan: #00ffcc;
    --accent-magenta: #ff00aa;
    --text-primary: #ffffff;
    --text-dim: #6a7a8a;
    --glow-cyan: 0 0 20px rgba(0, 255, 204, 0.5);
    --glow-magenta: 0 0 20px rgba(255, 0, 170, 0.5);
    --font-display: 'Clash Display', sans-serif;
    --font-body: 'Satoshi', sans-serif;
}

body { background: var(--bg-deep); font-family: var(--font-body); color: var(--text-primary); }

/* Grid background */
.grid-bg {
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

/* Gradient orbs */
.cyber-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
}
.orb-cyan {
    width: clamp(200px, 30vw, 400px);
    height: clamp(200px, 30vw, 400px);
    background: var(--accent-cyan);
    opacity: 0.08;
    top: 10%;
    left: 5%;
}
.orb-magenta {
    width: clamp(200px, 30vw, 400px);
    height: clamp(200px, 30vw, 400px);
    background: var(--accent-magenta);
    opacity: 0.06;
    bottom: 5%;
    right: 5%;
}

/* Scanline effect */
.scanline {
    position: absolute;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
    opacity: 0.3;
    pointer-events: none;
    animation: scan 6s linear infinite;
}
@keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
}

/* Content */
.content-wrapper {
    max-width: 700px;
    text-align: center;
    padding: clamp(1.5rem, 4vw, 3rem);
    z-index: 5;
    position: relative;
}

/* Status line */
.status-line {
    display: inline-flex;
    align-items: center;
    gap: 0.5em;
    font-size: var(--small-size);
    color: var(--accent-cyan);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: clamp(0.75rem, 2vw, 1.5rem);
    font-weight: 500;
}
.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-cyan);
    box-shadow: var(--glow-cyan);
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

/* Title with glow */
.content-wrapper h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: var(--title-size);
    line-height: 0.95;
    letter-spacing: -0.02em;
    margin-bottom: clamp(0.75rem, 2vw, 1.5rem);
    background: linear-gradient(135deg, #ffffff 0%, var(--accent-cyan) 50%, var(--accent-magenta) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Description */
.content-wrapper p {
    font-size: var(--body-size);
    color: var(--text-dim);
    line-height: 1.7;
    max-width: 500px;
    margin: 0 auto clamp(1rem, 2vw, 1.5rem);
}

/* Feature cards */
.feature-row {
    display: flex;
    gap: clamp(0.5rem, 1.5vw, 1rem);
    justify-content: center;
    flex-wrap: wrap;
}
.feature-card {
    background: var(--bg-card);
    border: 1px solid rgba(0, 255, 204, 0.15);
    border-radius: 12px;
    padding: clamp(0.6rem, 1.5vw, 1rem) clamp(1rem, 2vw, 1.5rem);
    backdrop-filter: blur(10px);
}
.feature-card .num {
    font-family: var(--font-display);
    font-size: var(--h2-size);
    color: var(--accent-cyan);
    text-shadow: var(--glow-cyan);
    display: block;
}
.feature-card .label {
    font-size: var(--small-size);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

/* Corner brackets */
.corner-bracket {
    position: absolute;
    width: clamp(20px, 3vw, 40px);
    height: clamp(20px, 3vw, 40px);
    border: 2px solid var(--accent-cyan);
    pointer-events: none;
}
.cb-tl { top: clamp(1rem, 2vw, 1.5rem); left: clamp(1rem, 2vw, 1.5rem); border-right: none; border-bottom: none; }
.cb-tr { top: clamp(1rem, 2vw, 1.5rem); right: clamp(1rem, 2vw, 1.5rem); border-left: none; border-bottom: none; }
.cb-bl { bottom: clamp(1rem, 2vw, 1.5rem); left: clamp(1rem, 2vw, 1.5rem); border-right: none; border-top: none; }
.cb-br { bottom: clamp(1rem, 2vw, 1.5rem); right: clamp(1rem, 2vw, 1.5rem); border-left: none; border-top: none; }

/* Animations */
.reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s var(--ease-out-expo), transform 0.8s var(--ease-out-expo); }
.visible .reveal:nth-child(1) { transition-delay: 0.1s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(2) { transition-delay: 0.25s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(3) { transition-delay: 0.4s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(4) { transition-delay: 0.55s; opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<canvas id="particles" style="position:fixed;inset:0;pointer-events:none;z-index:1;"></canvas>

<section class="slide" id="slide1">
    <div class="grid-bg"></div>
    <div class="cyber-orb orb-cyan"></div>
    <div class="cyber-orb orb-magenta"></div>
    <div class="scanline"></div>

    <div class="corner-bracket cb-tl"></div>
    <div class="corner-bracket cb-tr"></div>
    <div class="corner-bracket cb-bl"></div>
    <div class="corner-bracket cb-br"></div>

    <div class="content-wrapper">
        <div class="status-line reveal">
            <span class="status-dot"></span>
            系统在线 · v3.0
        </div>
        <h1 class="reveal">进入网格</h1>
        <p class="reveal">面向自主 AI 智能体的下一代基础设施。以思想的速度部署、扩展与编排智能系统。</p>
        <div class="feature-row reveal">
            <div class="feature-card">
                <span class="num">99.9%</span>
                <span class="label">可用率</span>
            </div>
            <div class="feature-card">
                <span class="num">&lt;50ms</span>
                <span class="label">延迟</span>
            </div>
            <div class="feature-card">
                <span class="num">∞</span>
                <span class="label">扩展</span>
            </div>
        </div>
    </div>
</section>

<script>
if (location.search.includes('thumb')) {
    document.querySelectorAll('.slide').forEach(s => s.classList.add('visible'));
} else {
    const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.2 });
    document.querySelectorAll('.slide').forEach(s => obs.observe(s));
}

// Particle system
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const particles = [];
for (let i = 0; i < 40; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        size: Math.random() * 1.5 + 0.5,
        color: Math.random() > 0.5 ? 'rgba(0,255,204,' : 'rgba(255,0,170,'
    });
}
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color + '0.6)';
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) animate();
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
