<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜花秘境 — 风格预览</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
/* === VIEWPORT BASE === */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow-x: hidden; }
.slide { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }
:root {
    --title-size: clamp(2rem, 6vw, 5rem);
    --body-size: clamp(0.8rem, 1.4vw, 1.125rem);
    --small-size: clamp(0.7rem, 1vw, 0.875rem);
    --slide-padding: clamp(1.5rem, 4vw, 4rem);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}
@media (max-height: 600px) { :root { --title-size: clamp(1.5rem, 4vw, 2.5rem); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; } }

/* === DARK BOTANICAL THEME === */
:root {
    --bg-primary: #0f0f0f;
    --text-primary: #e8e4df;
    --text-secondary: #9a9590;
    --accent-warm: #d4a574;
    --accent-pink: #e8b4b8;
    --accent-gold: #c9b896;
    --font-display: 'Cormorant', serif;
    --font-body: 'IBM Plex Sans', sans-serif;
}

body { background: var(--bg-primary); font-family: var(--font-body); color: var(--text-primary); }

/* Abstract soft gradient circles */
.gradient-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
}
.orb-1 { width: 400px; height: 400px; background: var(--accent-warm); top: 5%; left: -5%; }
.orb-2 { width: 350px; height: 350px; background: var(--accent-pink); bottom: 5%; right: -5%; }
.orb-3 { width: 250px; height: 250px; background: var(--accent-gold); top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.08; }

/* Thin vertical accent line */
.accent-line {
    position: absolute;
    left: 50%;
    top: 0;
    width: 1px;
    height: 100%;
    background: linear-gradient(to bottom, transparent, var(--accent-warm), transparent);
    opacity: 0.3;
    pointer-events: none;
}

/* Content */
.content-wrapper {
    text-align: center;
    max-width: 700px;
    padding: var(--slide-padding);
    z-index: 2;
    position: relative;
}
.overline {
    font-size: var(--small-size);
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--accent-warm);
    margin-bottom: clamp(1rem, 2vw, 1.5rem);
    font-weight: 300;
}
.content-wrapper h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: var(--title-size);
    line-height: 1.1;
    color: var(--text-primary);
    margin-bottom: clamp(0.75rem, 2vw, 1.5rem);
}
.content-wrapper h1 em {
    font-style: italic;
    color: var(--accent-pink);
    font-weight: 600;
}
.content-wrapper p {
    font-size: var(--body-size);
    font-weight: 300;
    line-height: 1.7;
    color: var(--text-secondary);
    max-width: 480px;
    margin: 0 auto;
}

/* Divider */
.divider {
    width: 40px;
    height: 1px;
    background: var(--accent-gold);
    margin: clamp(1rem, 2vw, 1.5rem) auto;
    opacity: 0.5;
}

/* Signature */
.signature {
    font-family: var(--font-display);
    font-style: italic;
    font-size: var(--body-size);
    color: var(--accent-warm);
    margin-top: clamp(0.5rem, 1.5vw, 1rem);
}

/* Corner labels */
.corner-label {
    position: absolute;
    font-size: var(--small-size);
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0.5;
    z-index: 3;
}
.corner-tl { top: clamp(1rem, 3vw, 2rem); left: clamp(1rem, 3vw, 2rem); }
.corner-tr { top: clamp(1rem, 3vw, 2rem); right: clamp(1rem, 3vw, 2rem); }
.corner-bl { bottom: clamp(1rem, 3vw, 2rem); left: clamp(1rem, 3vw, 2rem); }
.corner-br { bottom: clamp(1rem, 3vw, 2rem); right: clamp(1rem, 3vw, 2rem); }

/* Animations */
.reveal { opacity: 0; transform: translateY(30px); transition: opacity 1s var(--ease-out-expo), transform 1s var(--ease-out-expo); }
.visible .reveal:nth-child(1) { transition-delay: 0.2s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(2) { transition-delay: 0.5s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(3) { transition-delay: 0.8s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(4) { transition-delay: 1.1s; opacity: 1; transform: translateY(0); }
.visible .reveal:nth-child(5) { transition-delay: 1.4s; opacity: 1; transform: translateY(0); }

/* Slow float for orbs */
@keyframes float {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(20px, -20px); }
}
.orb-1 { animation: float 8s ease-in-out infinite; }
.orb-2 { animation: float 10s ease-in-out infinite reverse; }
</style>
</head>
<body>

<section class="slide" id="slide1">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
    <div class="accent-line"></div>

    <div class="corner-label corner-tl">花之屋</div>
    <div class="corner-label corner-tr">第 04 期</div>
    <div class="corner-label corner-bl">创立于 MMXIX</div>
    <div class="corner-label corner-br">巴黎</div>

    <div class="content-wrapper">
        <div class="overline reveal">一种生活哲学</div>
        <h1 class="reveal">静默之 <em>美</em></h1>
        <div class="divider reveal"></div>
        <p class="reveal">在这个永不停止的世界里，我们创造会呼吸的空间。手工植物组合将每个角落变为静谧的圣殿。</p>
        <div class="signature reveal">— 以心意打造</div>
    </div>
</section>

<script>
if (location.search.includes('thumb')) {
    document.querySelectorAll('.slide').forEach(s => s.classList.add('visible'));
} else {
    const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.2 });
    document.querySelectorAll('.slide').forEach(s => obs.observe(s));
}
</script>
</body>
</html>
