<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>暗色柔光 · 风格预览</title>

  <!-- Fonts: 国内可访问的 Google Fonts 镜像 -->
  <link rel="preconnect" href="https://fonts.loli.net" />
  <link rel="stylesheet" href="https://fonts.loli.net/css2?family=Cormorant:ital,wght@0,400;0,600;1,400;1,600&family=IBM+Plex+Sans:wght@300;400;500&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" />

  <style>
    /* ===========================================
       VIEWPORT FITTING: MANDATORY BASE STYLES
       Include this ENTIRE file in every presentation.
       These styles ensure slides fit exactly in the viewport.
       =========================================== */

    /* 1. Lock html/body to viewport */
    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    html {
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }

    /* 2. Each slide = exact viewport height */
    .slide {
      width: 100vw;
      height: 100vh;
      height: 100dvh; /* Dynamic viewport height for mobile browsers */
      overflow: hidden; /* CRITICAL: Prevent ANY overflow */
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 3. Content container with flex for centering */
    .slide-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-height: 100%;
      overflow: hidden; /* Double-protection against overflow */
      padding: var(--slide-padding);
    }

    /* 4. ALL typography uses clamp() for responsive scaling */
    :root {
      /* Titles scale from mobile to desktop */
      --title-size: clamp(1.5rem, 5vw, 4rem);
      --h2-size: clamp(1.25rem, 3.5vw, 2.5rem);
      --h3-size: clamp(1rem, 2.5vw, 1.75rem);

      /* Body text */
      --body-size: clamp(0.75rem, 1.5vw, 1.125rem);
      --small-size: clamp(0.65rem, 1vw, 0.875rem);

      /* Spacing scales with viewport */
      --slide-padding: clamp(1rem, 4vw, 4rem);
      --content-gap: clamp(0.5rem, 2vw, 2rem);
      --element-gap: clamp(0.25rem, 1vw, 1rem);
    }

    /* 5. Cards/containers use viewport-relative max sizes */
    .card, .container, .content-box {
      max-width: min(90vw, 1000px);
      max-height: min(80vh, 700px);
    }

    /* 6. Lists auto-scale with viewport */
    .feature-list, .bullet-list {
      gap: clamp(0.4rem, 1vh, 1rem);
    }

    .feature-list li, .bullet-list li {
      font-size: var(--body-size);
      line-height: 1.4;
    }

    /* 7. Grids adapt to available space */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 250px), 1fr));
      gap: clamp(0.5rem, 1.5vw, 1rem);
    }

    /* 8. Images constrained to viewport */
    img, .image-container {
      max-width: 100%;
      max-height: min(50vh, 400px);
      object-fit: contain;
    }

    /* ===========================================
       RESPONSIVE BREAKPOINTS
       Aggressive scaling for smaller viewports
       =========================================== */

    /* Short viewports (< 700px height) */
    @media (max-height: 700px) {
      :root {
        --slide-padding: clamp(0.75rem, 3vw, 2rem);
        --content-gap: clamp(0.4rem, 1.5vw, 1rem);
        --title-size: clamp(1.25rem, 4.5vw, 2.5rem);
        --h2-size: clamp(1rem, 3vw, 1.75rem);
      }
    }

    /* Very short viewports (< 600px height) */
    @media (max-height: 600px) {
      :root {
        --slide-padding: clamp(0.5rem, 2.5vw, 1.5rem);
        --content-gap: clamp(0.3rem, 1vw, 0.75rem);
        --title-size: clamp(1.1rem, 4vw, 2rem);
        --body-size: clamp(0.7rem, 1.2vw, 0.95rem);
      }

      /* Hide non-essential elements */
      .nav-dots, .decorative {
        display: none;
      }
    }

    /* Extremely short (landscape phones, < 500px height) */
    @media (max-height: 500px) {
      :root {
        --slide-padding: clamp(0.4rem, 2vw, 1rem);
        --title-size: clamp(1rem, 3.5vw, 1.5rem);
        --h2-size: clamp(0.9rem, 2.5vw, 1.25rem);
        --body-size: clamp(0.65rem, 1vw, 0.85rem);
      }
    }

    /* Narrow viewports (< 600px width) */
    @media (max-width: 600px) {
      :root {
        --title-size: clamp(1.25rem, 7vw, 2.5rem);
      }

      /* Stack grids vertically */
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* ===========================================
       REDUCED MOTION
       Respect user preferences
       =========================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.2s !important;
      }

      html {
        scroll-behavior: auto;
      }
    }

    /* ===========================================
       THEME: 暗色柔光（Dark Soft Glow）
       严格使用风格模版预设，不混搭色值。
       =========================================== */
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --text-primary: #e8e4df;
      --text-secondary: #9a9590;
      --accent-main: #d4a574;
      --accent-highlight: #e8b4b8;
      --accent-muted: #c9b896;
      --surface: rgba(232, 228, 223, 0.08);

      --font-serif: "Cormorant", "Noto Serif SC", serif;
      --font-sans: "IBM Plex Sans", "Noto Sans SC", sans-serif;

      --hero-size: clamp(3rem, 7.5vw, 7.5rem);
      --subtitle-size: clamp(0.8rem, 1.6vw, 1.25rem);
      --body-size: clamp(0.8rem, 1.4vw, 1.125rem);
      --small-size: clamp(0.65rem, 1vw, 0.875rem);

      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-normal: 0.8s;
    }

    /* ===========================================
       BASE RESET
       =========================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===========================================
       REVEAL ANIMATIONS
       =========================================== */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition:
        opacity var(--duration-normal) var(--ease-out-expo),
        transform var(--duration-normal) var(--ease-out-expo);
    }

    .slide.visible .reveal {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal:nth-child(1) { transition-delay: 0.1s; }
    .reveal:nth-child(2) { transition-delay: 0.25s; }
    .reveal:nth-child(3) { transition-delay: 0.4s; }
    .reveal:nth-child(4) { transition-delay: 0.55s; }
    .reveal:nth-child(5) { transition-delay: 0.7s; }

    /* ===========================================
       COVER SLIDE: HERO DARK + SOFT GLOW
       深黑底、柔焦光晕、左右细竖线、居中衬线标题。
       =========================================== */
    .title-slide {
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    /* 柔焦光晕层 */
    .glow-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(min(80px, 8vw));
      opacity: 0.32;
      pointer-events: none;
    }

    .glow-1 {
      width: min(55vw, 560px);
      height: min(55vw, 560px);
      top: -12%;
      right: -8%;
      background: radial-gradient(circle at center, var(--accent-main), transparent 70%);
      animation: float-1 10s ease-in-out infinite alternate;
    }

    .glow-2 {
      width: min(48vw, 480px);
      height: min(48vw, 480px);
      bottom: -14%;
      left: -10%;
      background: radial-gradient(circle at center, var(--accent-highlight), transparent 70%);
      animation: float-2 12s ease-in-out infinite alternate;
    }

    .glow-3 {
      width: min(32vw, 320px);
      height: min(32vw, 320px);
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at center, var(--accent-muted), transparent 70%);
      opacity: 0.18;
      animation: float-3 14s ease-in-out infinite alternate;
    }

    @keyframes float-1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-3%, 4%) scale(1.05); }
    }

    @keyframes float-2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(4%, -3%) scale(1.06); }
    }

    @keyframes float-3 {
      0% { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-46%, -54%) scale(1.08); }
    }

    /* 左右细垂直装饰线 */
    .vert-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(212, 165, 116, 0.22) 18%,
        rgba(212, 165, 116, 0.22) 82%,
        transparent 100%
      );
    }

    .vert-line.left { left: clamp(1.25rem, 5vw, 4rem); }
    .vert-line.right { right: clamp(1.25rem, 5vw, 4rem); }

    /* 封面内容：全屏居中 */
    .title-slide .slide-content {
      position: relative;
      z-index: 2;
      align-items: center;
      text-align: center;
    }

    /* 英文引导小字 */
    .hero-kicker {
      font-family: var(--font-sans);
      font-size: var(--small-size);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: var(--accent-main);
      margin-bottom: var(--element-gap);
    }

    /* 超大主标题：衬线，关键词斜体暖金 */
    .hero-title {
      font-family: var(--font-serif);
      font-size: var(--hero-size);
      font-weight: 600;
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: var(--content-gap);
    }

    .hero-title em {
      font-style: italic;
      color: var(--accent-main);
      font-weight: 600;
    }

    /* 封面说明 */
    .hero-lead {
      font-family: var(--font-sans);
      font-size: var(--body-size);
      font-weight: 300;
      line-height: 1.75;
      max-width: min(58ch, 76vw);
      color: var(--text-secondary);
      margin-bottom: var(--content-gap);
    }

    /* 关键词标签 */
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(0.5rem, 1.5vw, 1rem);
      font-family: var(--font-sans);
      font-size: var(--small-size);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    .meta-row span {
      padding: 0.35em 0.85em;
      border: 1px solid var(--surface);
      border-radius: 999px;
      color: var(--accent-main);
      background: rgba(212, 165, 116, 0.06);
    }

    /* 底部杂志式元数据 */
    .hero-footer {
      position: absolute;
      bottom: var(--slide-padding);
      left: var(--slide-padding);
      right: var(--slide-padding);
      z-index: 2;
      display: flex;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-size: var(--small-size);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      opacity: 0.65;
    }

    /* ===========================================
       PROGRESS BAR & NAV DOTS
       =========================================== */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      width: 100%;
      z-index: 100;
      background: rgba(232, 228, 223, 0.08);
    }

    .progress-bar::after {
      content: "";
      display: block;
      height: 100%;
      width: 100%;
      background: var(--accent-main);
      transform-origin: left;
      transform: scaleX(1);
      transition: transform 0.4s var(--ease-out-expo);
    }

    .nav-dots {
      position: fixed;
      right: var(--slide-padding);
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .nav-dots button {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid rgba(232, 228, 223, 0.25);
      background: transparent;
      cursor: pointer;
      padding: 0;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .nav-dots button.active {
      background: var(--accent-main);
      border-color: var(--accent-main);
    }

    /* ===========================================
       INLINE EDITING UI
       =========================================== */
    .edit-hotzone {
      position: fixed;
      top: 0;
      left: 0;
      width: 80px;
      height: 80px;
      z-index: 10000;
      cursor: pointer;
    }

    .edit-toggle {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10001;
      padding: 0.45rem 0.75rem;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid rgba(232, 228, 223, 0.15);
      border-radius: 999px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .edit-toggle.show,
    .edit-toggle.active {
      opacity: 1;
      pointer-events: auto;
    }

    body.edit-active [contenteditable="true"] {
      outline: 1px dashed rgba(212, 165, 116, 0.55);
      outline-offset: 4px;
      cursor: text;
    }

    /* ===========================================
       SMALL VIEWPORT TWEAKS FOR COVER
       =========================================== */
    @media (max-width: 600px) {
      .hero-title {
        letter-spacing: -0.01em;
      }
      .meta-row span {
        padding: 0.3em 0.65em;
      }
    }
  </style>
</head>
<body>
  <!-- Progress indicator -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- Slide navigation dots -->
  <nav class="nav-dots" id="navDots" aria-label="幻灯片导航"></nav>

  <!-- Edit mode trigger -->
  <div class="edit-hotzone" aria-hidden="true"></div>
  <button class="edit-toggle" id="editToggle" title="编辑模式 (E)">✏️ 编辑</button>

  <!-- COVER SLIDE -->
  <section class="slide title-slide" id="slide-1" aria-label="封面">
    <div class="glow-layer">
      <div class="glow glow-1" aria-hidden="true"></div>
      <div class="glow glow-2" aria-hidden="true"></div>
      <div class="glow glow-3" aria-hidden="true"></div>
    </div>

    <div class="vert-line left" aria-hidden="true"></div>
    <div class="vert-line right" aria-hidden="true"></div>

    <div class="slide-content">
      <p class="hero-kicker reveal">Dark Soft Glow</p>
      <h1 class="hero-title reveal">暗色<em>柔光</em></h1>
      <p class="hero-lead reveal">
        优雅、克制、温暖而高级。以近乎纯黑的深底为画布，通过柔焦暖色光斑与纤细几何线条营造艺术感，适合高端宣讲与品牌发布会。
      </p>
      <div class="meta-row reveal">
        <span>暗色沉浸</span>
        <span>柔焦光晕</span>
        <span>衬线强调</span>
        <span>极简几何</span>
      </div>
    </div>

    <footer class="hero-footer">
      <span>Style Preview</span>
      <span>2026</span>
    </footer>
  </section>

  <script>
    /* ===========================================
       SLIDE PRESENTATION CONTROLLER
       =========================================== */
    class SlidePresentation {
      constructor() {
        this.slides = document.querySelectorAll('.slide');
        this.totalSlides = this.slides.length;
        this.currentIndex = 0;
        this.isScrolling = false;
        this.progressBar = document.getElementById('progressBar');
        this.navDots = document.getElementById('navDots');

        this.setupObserver();
        this.setupKeyboardNav();
        this.setupTouchNav();
        this.setupWheelNav();
        this.setupNavDots();
        this.updateUI();
      }

      setupObserver() {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              this.currentIndex = Array.from(this.slides).indexOf(entry.target);
              this.updateUI();
            }
          });
        }, { threshold: 0.3 });

        this.slides.forEach(s => observer.observe(s));
      }

      setupKeyboardNav() {
        document.addEventListener('keydown', (e) => {
          if (e.target.isContentEditable) return;

          if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
            e.preventDefault();
            this.goTo(this.currentIndex + 1);
          } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'PageUp') {
            e.preventDefault();
            this.goTo(this.currentIndex - 1);
          } else if (e.key === 'Home') {
            e.preventDefault();
            this.goTo(0);
          } else if (e.key === 'End') {
            e.preventDefault();
            this.goTo(this.totalSlides - 1);
          }
        });
      }

      setupTouchNav() {
        let startY = 0;
        document.addEventListener('touchstart', (e) => {
          if (e.target.isContentEditable) return;
          startY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
          if (e.target.isContentEditable) return;
          const diff = startY - e.changedTouches[0].clientY;
          if (Math.abs(diff) > 50) {
            this.goTo(this.currentIndex + (diff > 0 ? 1 : -1));
          }
        }, { passive: true });
      }

      setupWheelNav() {
        document.addEventListener('wheel', (e) => {
          if (this.isScrolling) return;
          this.isScrolling = true;
          setTimeout(() => { this.isScrolling = false; }, 800);
          if (e.deltaY > 0) this.goTo(this.currentIndex + 1);
          else if (e.deltaY < 0) this.goTo(this.currentIndex - 1);
        }, { passive: true });
      }

      goTo(index) {
        if (index < 0 || index >= this.totalSlides) return;
        this.slides[index].scrollIntoView({ behavior: 'smooth' });
      }

      setupNavDots() {
        if (!this.navDots) return;
        this.navDots.innerHTML = '';
        for (let i = 0; i < this.totalSlides; i++) {
          const btn = document.createElement('button');
          btn.setAttribute('aria-label', `幻灯片 ${i + 1}`);
          btn.addEventListener('click', () => this.goTo(i));
          this.navDots.appendChild(btn);
        }
        this.dots = this.navDots.querySelectorAll('button');
      }

      updateUI() {
        if (this.progressBar) {
          const scale = (this.currentIndex + 1) / this.totalSlides;
          this.progressBar.style.background = `linear-gradient(to right, var(--accent-main) ${scale * 100}%, rgba(232,228,223,0.08) ${scale * 100}%)`;
        }
        if (this.dots) {
          this.dots.forEach((dot, i) => dot.classList.toggle('active', i === this.currentIndex));
        }
      }
    }

    /* ===========================================
       INLINE EDITOR
       =========================================== */
    class InlineEditor {
      constructor() {
        this.isActive = false;
        this.toggleBtn = document.getElementById('editToggle');
        this.hotzone = document.querySelector('.edit-hotzone');
        this.hideTimeout = null;

        this.setupToggle();
        this.setupHotzone();
        this.setupAutoSave();
        this.setupExport();
      }

      setupToggle() {
        this.toggleBtn.addEventListener('click', () => this.toggleEditMode());
      }

      setupHotzone() {
        const show = () => {
          clearTimeout(this.hideTimeout);
          this.toggleBtn.classList.add('show');
        };
        const hide = () => {
          this.hideTimeout = setTimeout(() => {
            if (!this.isActive) this.toggleBtn.classList.remove('show');
          }, 400);
        };

        this.hotzone.addEventListener('mouseenter', show);
        this.hotzone.addEventListener('mouseleave', hide);
        this.toggleBtn.addEventListener('mouseenter', show);
        this.toggleBtn.addEventListener('mouseleave', hide);
        this.hotzone.addEventListener('click', () => this.toggleEditMode());
      }

      toggleEditMode() {
        this.isActive = !this.isActive;
        document.body.classList.toggle('edit-active', this.isActive);
        this.toggleBtn.classList.toggle('active', this.isActive);
        this.toggleBtn.textContent = this.isActive ? '✓ 完成' : '✏️ 编辑';

        const textElements = document.querySelectorAll(
          'h1, h2, h3, h4, p, li, .hero-kicker, .meta-row span, .hero-footer span, em'
        );
        textElements.forEach(el => {
          if (this.isActive) {
            el.setAttribute('contenteditable', 'true');
          } else {
            el.removeAttribute('contenteditable');
          }
        });
      }

      setupAutoSave() {
        const key = 'ppt-' + document.title;
        const saved = localStorage.getItem(key);
        if (saved) {
          try {
            JSON.parse(saved).forEach(item => {
              const el = document.querySelector(`[data-edit-id="${item.id}"]`);
              if (el) el.innerHTML = item.html;
            });
          } catch (e) {}
        }

        document.addEventListener('input', (e) => {
          if (e.target.isContentEditable) {
            const editable = document.querySelectorAll('[contenteditable="true"]');
            const data = Array.from(editable).map(el => {
              if (!el.dataset.editId) {
                el.dataset.editId = 'ed-' + Math.random().toString(36).slice(2, 10);
              }
              return { id: el.dataset.editId, html: el.innerHTML };
            });
            localStorage.setItem(key, JSON.stringify(data));
          }
        });
      }

      setupExport() {
        document.addEventListener('keydown', (e) => {
          if ((e.key === 's' || e.key === 'S') && (e.ctrlKey || e.metaKey) && this.isActive) {
            e.preventDefault();
            this.exportFile();
          }
        });
      }

      exportFile() {
        const editableEls = Array.from(document.querySelectorAll('[contenteditable]'));
        editableEls.forEach(el => el.removeAttribute('contenteditable'));
        document.body.classList.remove('edit-active');
        this.toggleBtn?.classList.remove('active', 'show');

        const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

        document.body.classList.add('edit-active');
        editableEls.forEach(el => el.setAttribute('contenteditable', 'true'));
        this.toggleBtn?.classList.add('active');

        const blob = new Blob([html], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'dark-soft-glow-cover-preview.html';
        a.click();
        URL.revokeObjectURL(a.href);
      }
    }

    /* Keyboard shortcut for edit mode */
    const editor = new InlineEditor();
    document.addEventListener('keydown', (e) => {
      if ((e.key === 'e' || e.key === 'E') && !e.target.isContentEditable) {
        editor.toggleEditMode();
      }
    });

    new SlidePresentation();
  </script>
</body>
</html>
