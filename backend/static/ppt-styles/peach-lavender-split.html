<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桃紫分境 · 封面预览</title>
    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="stylesheet" href="https://fonts.loli.net/css2?family=Outfit:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap">
    <style>
        /* ===========================================
           VIEWPORT FITTING: MANDATORY BASE STYLES
           Include this ENTIRE file in every presentation.
           These styles ensure slides fit exactly in the viewport.
           =========================================== */

        /* 1. Lock html/body to viewport */
        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* 2. Each slide = exact viewport height */
        .slide {
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height for mobile browsers */
            overflow: hidden; /* CRITICAL: Prevent ANY overflow */
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 3. Content container with flex for centering */
        .slide-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-height: 100%;
            overflow: hidden; /* Double-protection against overflow */
            padding: var(--slide-padding);
        }

        /* 4. ALL typography uses clamp() for responsive scaling */
        :root {
            /* Titles scale from mobile to desktop */
            --title-size: clamp(1.5rem, 5vw, 4rem);
            --h2-size: clamp(1.25rem, 3.5vw, 2.5rem);
            --h3-size: clamp(1rem, 2.5vw, 1.75rem);

            /* Body text */
            --body-size: clamp(0.75rem, 1.5vw, 1.125rem);
            --small-size: clamp(0.65rem, 1vw, 0.875rem);

            /* Spacing scales with viewport */
            --slide-padding: clamp(1rem, 4vw, 4rem);
            --content-gap: clamp(0.5rem, 2vw, 2rem);
            --element-gap: clamp(0.25rem, 1vw, 1rem);
        }

        /* 5. Cards/containers use viewport-relative max sizes */
        .card, .container, .content-box {
            max-width: min(90vw, 1000px);
            max-height: min(80vh, 700px);
        }

        /* 6. Lists auto-scale with viewport */
        .feature-list, .bullet-list {
            gap: clamp(0.4rem, 1vh, 1rem);
        }

        .feature-list li, .bullet-list li {
            font-size: var(--body-size);
            line-height: 1.4;
        }

        /* 7. Grids adapt to available space */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 250px), 1fr));
            gap: clamp(0.5rem, 1.5vw, 1rem);
        }

        /* 8. Images constrained to viewport */
        img, .image-container {
            max-width: 100%;
            max-height: min(50vh, 400px);
            object-fit: contain;
        }

        /* ===========================================
           RESPONSIVE BREAKPOINTS
           Aggressive scaling for smaller viewports
           =========================================== */

        /* Short viewports (< 700px height) */
        @media (max-height: 700px) {
            :root {
                --slide-padding: clamp(0.75rem, 3vw, 2rem);
                --content-gap: clamp(0.4rem, 1.5vw, 1rem);
                --title-size: clamp(1.25rem, 4.5vw, 2.5rem);
                --h2-size: clamp(1rem, 3vw, 1.75rem);
            }
        }

        /* Very short viewports (< 600px height) */
        @media (max-height: 600px) {
            :root {
                --slide-padding: clamp(0.5rem, 2.5vw, 1.5rem);
                --content-gap: clamp(0.3rem, 1vw, 0.75rem);
                --title-size: clamp(1.1rem, 4vw, 2rem);
                --body-size: clamp(0.7rem, 1.2vw, 0.95rem);
            }

            /* Hide non-essential elements */
            .nav-dots, .decorative {
                display: none;
            }
        }

        /* Extremely short (landscape phones, < 500px height) */
        @media (max-height: 500px) {
            :root {
                --slide-padding: clamp(0.4rem, 2vw, 1rem);
                --title-size: clamp(1rem, 3.5vw, 1.5rem);
                --h2-size: clamp(0.9rem, 2.5vw, 1.25rem);
                --body-size: clamp(0.65rem, 1vw, 0.85rem);
            }
        }

        /* Narrow viewports (< 600px width) */
        @media (max-width: 600px) {
            :root {
                --title-size: clamp(1.25rem, 7vw, 2.5rem);
            }

            /* Stack grids vertically */
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===========================================
           REDUCED MOTION
           Respect user preferences
           =========================================== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.2s !important;
            }

            html {
                scroll-behavior: auto;
            }
        }

        /* ===========================================
           THEME: PEACH-LAVENDER SPLIT
           Color system and typography from the style template
           =========================================== */
        :root {
            --bg-primary: #e4dff0;
            --bg-secondary: #f5e6dc;
            --text-primary: #1a1a1a;
            --text-secondary: #5a5a6a;
            --accent-main: #b8a0d8;
            --accent-highlight: #f0c8a0;
            --accent-muted: rgba(180, 160, 210, 0.15);
            --surface: rgba(255, 255, 255, 0.55);
            --badge-mint: #c8f0d8;
            --badge-yellow: #f0f0c8;
            --badge-pink: #f0d4e0;

            /* Typography */
            --font-display: "Outfit", "Noto Sans SC", sans-serif;
            --font-body: "Outfit", "Noto Sans SC", sans-serif;

            /* Animation */
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --duration-normal: 0.6s;
        }

        /* ===========================================
           BASE RESET
           =========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            color: var(--text-primary);
            background: var(--bg-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===========================================
           PROGRESS BAR
           Top fixed gradient bar
           =========================================== */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-highlight), var(--accent-main));
            z-index: 1000;
            transition: width 0.3s var(--ease-out-expo);
        }

        /* ===========================================
           NAVIGATION DOTS
           Right side vertical indicators
           =========================================== */
        .nav-dots {
            position: fixed;
            right: clamp(0.75rem, 2vw, 1.5rem);
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: clamp(0.5rem, 1vh, 0.75rem);
            z-index: 1000;
        }

        .nav-dots button {
            width: clamp(8px, 1vw, 12px);
            height: clamp(8px, 1vw, 12px);
            border-radius: 50%;
            border: 2px solid var(--accent-main);
            background: transparent;
            cursor: pointer;
            transition: all 0.3s var(--ease-out-expo);
            padding: 0;
        }

        .nav-dots button.active {
            background: var(--accent-main);
            transform: scale(1.3);
        }

        /* ===========================================
           SPLIT LAYOUT
           Left peach panel + right lavender panel
           =========================================== */
        .slide {
            display: grid;
            grid-template-columns: 45% 55%;
        }

        .panel-left {
            background: var(--bg-secondary);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: var(--slide-padding);
            padding-bottom: clamp(2rem, 6vh, 4rem);
        }

        .panel-right {
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: var(--slide-padding);
        }

        .panel-right::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--accent-muted) 1px, transparent 1px),
                linear-gradient(90deg, var(--accent-muted) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.5;
            pointer-events: none;
        }

        /* ===========================================
           TYPOGRAPHY
           =========================================== */
        .section-label {
            font-family: "Outfit", sans-serif;
            font-weight: 700;
            font-size: clamp(0.65rem, 1vw, 0.8rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: var(--element-gap);
        }

        .slide-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: clamp(2rem, 5.5vw, 5rem);
            line-height: 1.05;
            color: var(--text-primary);
            margin-bottom: var(--element-gap);
        }

        .slide-subtitle {
            font-family: "Outfit", sans-serif;
            font-weight: 500;
            font-size: clamp(0.875rem, 1.5vw, 1.25rem);
            line-height: 1.5;
            color: var(--text-secondary);
        }

        .cover-tagline {
            font-family: "Outfit", sans-serif;
            font-weight: 800;
            font-size: clamp(1.25rem, 2.5vw, 2rem);
            color: var(--text-primary);
            line-height: 1.3;
            margin-top: var(--content-gap);
        }

        .cover-slogan {
            font-family: "Outfit", sans-serif;
            font-weight: 700;
            font-size: clamp(1.5rem, 4vw, 3rem);
            line-height: 1.15;
            color: var(--text-primary);
            margin-bottom: var(--content-gap);
        }

        .cover-modules {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(0.5rem, 1vw, 0.75rem);
            margin-top: var(--content-gap);
        }

        /* ===========================================
           BADGES
           Candy-colored pill labels
           =========================================== */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35em;
            padding: clamp(0.25rem, 0.5vw, 0.4rem) clamp(0.6rem, 1vw, 0.9rem);
            border-radius: 999px;
            font-family: "Outfit", sans-serif;
            font-weight: 700;
            font-size: clamp(0.65rem, 1vw, 0.8rem);
            line-height: 1;
            white-space: nowrap;
        }

        .badge-mint {
            background: var(--badge-mint);
            color: #2a5a3a;
        }

        .badge-yellow {
            background: var(--badge-yellow);
            color: #5a5a20;
        }

        .badge-pink {
            background: var(--badge-pink);
            color: #8a4058;
        }

        /* ===========================================
           ANIMATIONS
           Light bounce entrance
           =========================================== */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition:
                opacity var(--duration-normal) var(--ease-out-expo),
                transform var(--duration-normal) var(--ease-bounce);
        }

        .slide.visible .reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal:nth-child(1) { transition-delay: 0.08s; }
        .reveal:nth-child(2) { transition-delay: 0.16s; }
        .reveal:nth-child(3) { transition-delay: 0.24s; }
        .reveal:nth-child(4) { transition-delay: 0.32s; }
        .reveal:nth-child(5) { transition-delay: 0.4s; }
        .reveal:nth-child(6) { transition-delay: 0.48s; }

        /* ===========================================
           INLINE EDITING
           Default enabled
           =========================================== */
        .edit-hotzone {
            position: fixed;
            top: 0;
            left: 0;
            width: 80px;
            height: 80px;
            z-index: 10000;
            cursor: pointer;
        }

        .edit-toggle {
            position: fixed;
            top: clamp(0.75rem, 2vw, 1rem);
            left: clamp(0.75rem, 2vw, 1rem);
            width: clamp(2rem, 4vw, 2.5rem);
            height: clamp(2rem, 4vw, 2.5rem);
            border-radius: 50%;
            border: none;
            background: var(--surface);
            backdrop-filter: blur(8px);
            font-size: clamp(1rem, 2vw, 1.25rem);
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-toggle.show,
        .edit-toggle.active {
            opacity: 1;
            pointer-events: auto;
        }

        body.edit-active h1,
        body.edit-active h2,
        body.edit-active h3,
        body.edit-active p,
        body.edit-active .badge,
        body.edit-active .cover-tagline,
        body.edit-active .cover-slogan {
            outline: 1px dashed var(--accent-main);
            outline-offset: 2px;
            cursor: text;
        }

        /* ===========================================
           RESPONSIVE ADJUSTMENTS FOR SPLIT LAYOUT
           =========================================== */
        @media (max-width: 768px) {
            .slide {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .panel-left {
                justify-content: center;
                padding: clamp(1rem, 3vw, 1.5rem);
                min-height: auto;
                padding-bottom: clamp(1rem, 3vw, 1.5rem);
            }

            .panel-right {
                padding: clamp(1rem, 3vw, 1.5rem);
            }

            .cover-tagline {
                margin-top: var(--element-gap);
            }
        }
    </style>
</head>
<body>
    <!-- Progress bar -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- Navigation dots -->
    <nav class="nav-dots" id="navDots" aria-label="幻灯片导航"></nav>

    <!-- Inline editing controls -->
    <div class="edit-hotzone" id="editHotzone"></div>
    <button class="edit-toggle" id="editToggle" title="编辑模式 (E)">✏️</button>

    <!-- ===========================================
         COVER SLIDE: TEMPLATE PREVIEW
         =========================================== -->
    <section class="slide slide-cover">
        <div class="panel-left">
            <div class="reveal">
                <span class="badge badge-mint">模版预览</span>
            </div>
            <h1 class="slide-title reveal">桃紫分境</h1>
            <p class="slide-subtitle reveal">Peach-Lavender Split · 柔和明快的 Pastel 分屏风格</p>
            <div class="cover-tagline reveal">像翻开一本装订精美的知识手账</div>
        </div>
        <div class="panel-right">
            <div class="cover-slogan reveal">蜜桃色 × 薰衣草紫<br>糖果标签 × 半透明卡片</div>
            <p class="slide-subtitle reveal">本风格以左右 pastel 分屏为识别核心，左侧蜜桃色承载标题，右侧薰衣草紫叠加淡网格纹理，适合轻松培训、知识分享与轻编辑感演示。</p>
            <div class="cover-modules reveal">
                <span class="badge badge-yellow">左右分屏</span>
                <span class="badge badge-pink">淡紫网格</span>
                <span class="badge badge-mint">糖果标签</span>
                <span class="badge badge-yellow">轻弹动画</span>
                <span class="badge badge-pink">半透明卡片</span>
            </div>
        </div>
    </section>

    <script>
        /* ===========================================
           SLIDE PRESENTATION CONTROLLER
           Keyboard, touch, wheel navigation
           =========================================== */
        class SlidePresentation {
            constructor() {
                this.slides = document.querySelectorAll('.slide');
                this.totalSlides = this.slides.length;
                this.currentIndex = 0;
                this.isScrolling = false;
                this.progressBar = document.getElementById('progressBar');

                this.setupObserver();
                this.setupKeyboardNav();
                this.setupTouchNav();
                this.setupWheelNav();
                this.setupNavDots();
                this.updateUI();
            }

            setupObserver() {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            this.currentIndex = Array.from(this.slides).indexOf(entry.target);
                            this.updateUI();
                        }
                    });
                }, { threshold: 0.3 });
                this.slides.forEach(s => observer.observe(s));
            }

            setupKeyboardNav() {
                document.addEventListener('keydown', (e) => {
                    if (e.target.isContentEditable) return;

                    if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
                        e.preventDefault();
                        this.goTo(this.currentIndex + 1);
                    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'PageUp') {
                        e.preventDefault();
                        this.goTo(this.currentIndex - 1);
                    } else if (e.key === 'Home') {
                        e.preventDefault();
                        this.goTo(0);
                    } else if (e.key === 'End') {
                        e.preventDefault();
                        this.goTo(this.totalSlides - 1);
                    }
                });
            }

            setupTouchNav() {
                let startY = 0;
                document.addEventListener('touchstart', (e) => {
                    if (e.target.isContentEditable) return;
                    startY = e.touches[0].clientY;
                }, { passive: true });
                document.addEventListener('touchend', (e) => {
                    if (e.target.isContentEditable) return;
                    const diff = startY - e.changedTouches[0].clientY;
                    if (Math.abs(diff) > 50) {
                        this.goTo(this.currentIndex + (diff > 0 ? 1 : -1));
                    }
                }, { passive: true });
            }

            setupWheelNav() {
                document.addEventListener('wheel', (e) => {
                    if (this.isScrolling) return;
                    this.isScrolling = true;
                    setTimeout(() => { this.isScrolling = false; }, 800);
                    if (e.deltaY > 0) this.goTo(this.currentIndex + 1);
                    else if (e.deltaY < 0) this.goTo(this.currentIndex - 1);
                }, { passive: true });
            }

            goTo(index) {
                if (index < 0 || index >= this.totalSlides) return;
                this.slides[index].scrollIntoView({ behavior: 'smooth' });
            }

            updateUI() {
                if (this.progressBar) {
                    this.progressBar.style.width = ((this.currentIndex + 1) / this.totalSlides * 100) + '%';
                }
                if (this.dots) {
                    this.dots.forEach((dot, i) => {
                        dot.classList.toggle('active', i === this.currentIndex);
                    });
                }
            }

            setupNavDots() {
                const container = document.getElementById('navDots');
                if (!container) return;
                container.innerHTML = '';
                for (let i = 0; i < this.totalSlides; i++) {
                    const btn = document.createElement('button');
                    btn.setAttribute('aria-label', `幻灯片 ${i + 1}`);
                    btn.addEventListener('click', () => this.goTo(i));
                    container.appendChild(btn);
                }
                this.dots = container.querySelectorAll('button');
            }
        }

        /* ===========================================
           INLINE EDITOR
           Toggle edit mode, auto-save to localStorage
           =========================================== */
        class InlineEditor {
            constructor() {
                this.isActive = false;
                this.toggleBtn = document.getElementById('editToggle');
                this.hotzone = document.getElementById('editHotzone');
                this.setupToggle();
                this.setupHotzone();
                this.setupShortcut();
                this.setupAutoSave();
                this.setupExport();
            }

            setupToggle() {
                this.toggleBtn.addEventListener('click', () => this.toggleEditMode());
            }

            setupHotzone() {
                let hideTimeout = null;

                this.hotzone.addEventListener('mouseenter', () => {
                    clearTimeout(hideTimeout);
                    this.toggleBtn.classList.add('show');
                });
                this.hotzone.addEventListener('mouseleave', () => {
                    hideTimeout = setTimeout(() => {
                        if (!this.isActive) this.toggleBtn.classList.remove('show');
                    }, 400);
                });
                this.toggleBtn.addEventListener('mouseenter', () => {
                    clearTimeout(hideTimeout);
                });
                this.toggleBtn.addEventListener('mouseleave', () => {
                    hideTimeout = setTimeout(() => {
                        if (!this.isActive) this.toggleBtn.classList.remove('show');
                    }, 400);
                });
                this.hotzone.addEventListener('click', () => this.toggleEditMode());
            }

            setupShortcut() {
                document.addEventListener('keydown', (e) => {
                    if ((e.key === 'e' || e.key === 'E') && !e.target.isContentEditable) {
                        this.toggleEditMode();
                    }
                });
            }

            toggleEditMode() {
                this.isActive = !this.isActive;
                document.body.classList.toggle('edit-active', this.isActive);
                this.toggleBtn.classList.toggle('active', this.isActive);
                this.toggleBtn.textContent = this.isActive ? '✓' : '✏️';

                const textElements = document.querySelectorAll(
                    'h1, h2, h3, p, .badge, .cover-tagline, .cover-slogan'
                );
                textElements.forEach(el => {
                    if (this.isActive) {
                        el.setAttribute('contenteditable', 'true');
                    } else {
                        el.removeAttribute('contenteditable');
                    }
                });
            }

            setupAutoSave() {
                const key = 'ppt-' + document.title;
                const saved = localStorage.getItem(key);
                if (saved) {
                    try {
                        JSON.parse(saved).forEach(item => {
                            const el = document.querySelector(`[data-edit-id="${item.id}"]`);
                            if (el) el.innerHTML = item.html;
                        });
                    } catch(e) {}
                }
                document.addEventListener('input', (e) => {
                    if (e.target.isContentEditable) {
                        const editable = document.querySelectorAll('[contenteditable="true"]');
                        const data = Array.from(editable).map(el => {
                            if (!el.dataset.editId) {
                                el.dataset.editId = 'ed-' + Math.random().toString(36).slice(2, 10);
                            }
                            return { id: el.dataset.editId, html: el.innerHTML };
                        });
                        localStorage.setItem(key, JSON.stringify(data));
                    }
                });
            }

            setupExport() {
                document.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 's' && this.isActive) {
                        e.preventDefault();
                        this.exportFile();
                    }
                });
            }

            exportFile() {
                const editableEls = Array.from(document.querySelectorAll('[contenteditable]'));
                editableEls.forEach(el => el.removeAttribute('contenteditable'));
                document.body.classList.remove('edit-active');
                this.toggleBtn.classList.remove('active', 'show');

                const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

                document.body.classList.add('edit-active');
                editableEls.forEach(el => el.setAttribute('contenteditable', 'true'));
                this.toggleBtn.classList.add('active');

                const blob = new Blob([html], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = '桃紫分境_封面预览.html';
                a.click();
                URL.revokeObjectURL(a.href);
            }
        }

        /* ===========================================
           INITIALIZE
           =========================================== */
        const presentation = new SlidePresentation();
        const editor = new InlineEditor();
    </script>
</body>
</html>
